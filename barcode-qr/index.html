    <style>

        #qrContainer canvas,
        #qrContainer img {
            max-width: 100%;

        }

        .download-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px 40px;

            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;

        .download-btn:hover {

            transform: scale(1.05);

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #f8f9fa;
            margin-bottom: 5px;
            border-radius: 10px;
            font-size: 0.9em;
            cursor: pointer;
        }

        .history-item:hover {
            background: #e0e0e0;
        }

        @media (max-width: 700px) {
            .mode-switch {
                flex-direction: column;

            .mode-btn {
                width: 100%;
                text-align: center;
            }
        }

<body>
    <div id="top-panel-placeholder"></div>

    <div class="container">
        <h1>📦 Генератор кодов</h1>
        <div class="subtitle">Штрих-коды и QR-коды для любых целей</div>

        <!-- Переключатель режимов -->
        <div class="mode-switch">
            <button class="mode-btn active" id="barcodeModeBtn" onclick="switchMode('barcode')">📊 Штрих-код</button>
            <button class="mode-btn" id="qrModeBtn" onclick="switchMode('qr')">🔳 QR-код</button>
        </div>

        <!-- Карточка генератора -->
        <div class="generator-card">
            <!-- Режим штрих-кода -->
            <div id="barcodeMode">
                <div class="input-group">
                    <label>📝 Текст для штрих-кода</label>
                    <input type="text" id="barcodeText" placeholder="Например: 1234567890" value="5901234123457">
                </div>

                <div class="options-row">
                    <div class="option-item">
                        <label>📏 Формат</label>
                        <select id="barcodeFormat">
                            <option value="CODE128">CODE128 (любой текст)</option>
                            <option value="EAN13" selected>EAN-13 (13 цифр)</option>
                            <option value="EAN8">EAN-8 (8 цифр)</option>
                            <option value="UPC">UPC</option>
                            <option value="CODE39">CODE39</option>
                            <option value="ITF">ITF-14</option>
                        </select>
                    </div>

                    <div class="option-item">
                        <label>📐 Ширина</label>
                        <select id="barcodeWidth">
                            <option value="1">Маленький</option>
                            <option value="2" selected>Средний</option>
                            <option value="3">Большой</option>
                        </select>
                    </div>

                    <div class="option-item">
                        <label>📏 Высота</label>
                        <select id="barcodeHeight">
                            <option value="50">50px</option>
                            <option value="80" selected>80px</option>
                            <option value="120">120px</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Режим QR-кода -->
            <div id="qrMode" style="display: none;">
                <div class="input-group">
                    <label>🔗 Текст или ссылка</label>
                    <textarea id="qrText" placeholder="Введите текст или ссылку...">https://v-pk.vercel.app</textarea>
                </div>

                <div class="options-row">
                    <div class="option-item">
                        <label>📐 Размер</label>
                        <select id="qrSize">
                            <option value="150">Маленький (150x150)</option>
                            <option value="250" selected>Средний (250x250)</option>
                            <option value="350">Большой (350x350)</option>
                            <option value="500">Огромный (500x500)</option>
                        </select>
                    </div>

                    <div class="option-item">
                        <label>🎨 Коррекция ошибок</label>
                        <select id="qrErrorLevel">
                            <option value="L">L (7%)</option>
                            <option value="M" selected>M (15%)</option>
                            <option value="Q">Q (25%)</option>
                            <option value="H">H (30%)</option>
                        </select>
                    </div>
                </div>
            </div>

            <button class="generate-btn" onclick="generateCode()">
                🔄 СГЕНЕРИРОВАТЬ
            </button>

            <!-- Результат -->
            <div class="result-section" id="resultSection" style="display: none;">
                <h3>✨ Результат:</h3>
                
                <div id="barcodeResult" style="display: none;">
                    <div class="code-container">
                        <canvas id="barcodeCanvas"></canvas>
                    </div>
                    <button class="download-btn" onclick="downloadBarcode()">
                        ⬇️ Скачать PNG
                    </button>
                </div>

                <div id="qrResult" style="display: none;">
                    <div class="code-container" id="qrContainer"></div>
                    <button class="download-btn" onclick="downloadQR()">
                        ⬇️ Скачать PNG
                    </button>
                </div>

                <div class="info-text">
                    💡 Нажми на код для увеличения
                </div>
            </div>
        </div>

        <!-- История -->
        <div class="history-section">
            <div class="history-title">📜 История генераций</div>
            <ul class="history-list" id="historyList">
                <li class="history-item">Пока нет данных</li>
            </ul>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        let currentMode = 'barcode';
        let lastBarcodeData = null;
        let lastQRData = null;
        let history = JSON.parse(localStorage.getItem('codeHistory')) || [];

        // Переключение режимов
        function switchMode(mode) {
            currentMode = mode;
            
            document.getElementById('barcodeModeBtn').classList.remove('active');
            document.getElementById('qrModeBtn').classList.remove('active');
            
            if (mode === 'barcode') {
                document.getElementById('barcodeModeBtn').classList.add('active');
                document.getElementById('barcodeMode').style.display = 'block';
                document.getElementById('qrMode').style.display = 'none';
                document.getElementById('barcodeResult').style.display = 'none';
                document.getElementById('qrResult').style.display = 'none';
            } else {
                document.getElementById('qrModeBtn').classList.add('active');
                document.getElementById('qrMode').style.display = 'block';
                document.getElementById('barcodeMode').style.display = 'none';
                document.getElementById('barcodeResult').style.display = 'none';
                document.getElementById('qrResult').style.display = 'none';
            }
            
            document.getElementById('resultSection').style.display = 'none';
        }

        // Генерация кода
        function generateCode() {
            if (currentMode === 'barcode') {
                generateBarcode();
            } else {
                generateQR();
            }
        }

        // Генерация штрих-кода
        function generateBarcode() {
            const text = document.getElementById('barcodeText').value;
            const format = document.getElementById('barcodeFormat').value;
            const width = parseInt(document.getElementById('barcodeWidth').value);
            const height = parseInt(document.getElementById('barcodeHeight').value);

            if (!text) {
                alert('Введите текст для штрих-кода!');
                return;
            }

            try {
                const canvas = document.getElementById('barcodeCanvas');
                JsBarcode(canvas, text, {
                    format: format,
                    width: width,
                    height: height,
                    displayValue: true,
                    fontSize: 18,
                    margin: 10
                });

                lastBarcodeData = {
                    text: text,
                    format: format,
                    canvasData: canvas.toDataURL('image/png')
                };

                document.getElementById('resultSection').style.display = 'block';
                document.getElementById('barcodeResult').style.display = 'block';
                document.getElementById('qrResult').style.display = 'none';
                
                addToHistory('Штрих-код', text);
                
            } catch (error) {
                alert('Ошибка генерации: ' + error.message);
            }
        }

        // Генерация QR-кода
        function generateQR() {
            const text = document.getElementById('qrText').value;
            const size = parseInt(document.getElementById('qrSize').value);
            const errorLevel = document.getElementById('qrErrorLevel').value;

            if (!text) {
                alert('Введите текст или ссылку!');
                return;
            }

            try {
                const container = document.getElementById('qrContainer');
                container.innerHTML = '';

                QRCode.toCanvas(text, {
                    width: size,
                    height: size,
                    errorCorrectionLevel: errorLevel,
                    margin: 2
                }, (error, canvas) => {
                    if (error) {
                        alert('Ошибка генерации: ' + error);
                        return;
                    }
                    
                    container.appendChild(canvas);
                    
                    lastQRData = {
                        text: text,
                        size: size,
                        canvasData: canvas.toDataURL('image/png')
                    };
                });

                document.getElementById('resultSection').style.display = 'block';
                document.getElementById('barcodeResult').style.display = 'none';
                document.getElementById('qrResult').style.display = 'block';
                
                addToHistory('QR-код', text);
                
            } catch (error) {
                alert('Ошибка генерации: ' + error);
            }
        }

        // Скачивание штрих-кода
        function downloadBarcode() {
            if (!lastBarcodeData) return;
            
            const link = document.createElement('a');
            link.download = `barcode-${Date.now()}.png`;
            link.href = lastBarcodeData.canvasData;
            link.click();
        }

        // Скачивание QR-кода
        function downloadQR() {
            if (!lastQRData) return;
            
            const link = document.createElement('a');
            link.download = `qrcode-${Date.now()}.png`;
            link.href = lastQRData.canvasData;
            link.click();
        }

        // Добавление в историю
        function addToHistory(type, value) {
            const item = {
                type: type,
                value: value.substring(0, 30) + (value.length > 30 ? '...' : ''),
                time: new Date().toLocaleString()
            };
            
            history.unshift(item);
            if (history.length > 10) history.pop();
            
            localStorage.setItem('codeHistory', JSON.stringify(history));
            updateHistory();
        }

        // Обновление истории
        function updateHistory() {
            const list = document.getElementById('historyList');
            
            if (history.length === 0) {
                list.innerHTML = '<li class="history-item">Пока нет данных</li>';
                return;
            }
            
            list.innerHTML = history.map(item => `
                <li class="history-item">
                    <span>${item.type}: ${item.value}</span>
                    <span style="color:#7f8c8d;">${item.time}</span>
                </li>
            `).join('');
        }

        // Инициализация
        updateHistory();
    </script>
</body>
</html>
