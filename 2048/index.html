<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - В ПК!</title>
    
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f0e7 0%, #e8e0d5 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            color: #776e65;
            font-size: 3em;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .subtitle {
            text-align: center;
            color: #9c8f84;
            margin-bottom: 30px;
        }

        /* Шапка игры */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .score-container {
            background: #bbada0;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            text-align: center;
            min-width: 100px;
        }

        .score-label {
            font-size: 0.9em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .score-value {
            font-size: 2em;
            font-weight: bold;
        }

        .best-container {
            background: #bbada0;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            text-align: center;
            min-width: 100px;
        }

        .new-game-btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .new-game-btn:hover {
            background: #9f8a76;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Поле игры */
        .game-container {
            position: relative;
            background: #bbada0;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            background: #bbada0;
            border-radius: 10px;
        }

        .grid-cell {
            width: 100%;
            aspect-ratio: 1;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 10px;
        }

        .tile-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            pointer-events: none;
        }

        .tile {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1;
            border-radius: 10px;
            font-size: 2.5em;
            font-weight: bold;
            color: #776e65;
            transition: all 0.15s;
            animation: appear 0.2s;
        }

        .tile-2 { background: #eee4da; }
        .tile-4 { background: #ede0c8; }
        .tile-8 { background: #f2b179; color: white; }
        .tile-16 { background: #f59563; color: white; }
        .tile-32 { background: #f67c5f; color: white; }
        .tile-64 { background: #f65e3b; color: white; }
        .tile-128 { background: #edcf72; color: white; font-size: 2em; }
        .tile-256 { background: #edcc61; color: white; font-size: 2em; }
        .tile-512 { background: #edc850; color: white; font-size: 2em; }
        .tile-1024 { background: #edc53f; color: white; font-size: 1.8em; }
        .tile-2048 { background: #edc22e; color: white; font-size: 1.8em; }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Управление */
        .controls-info {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 25px;
        }

        .controls-title {
            color: #776e65;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        .keys-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .key-group {
            text-align: center;
        }

        .key-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 5px 0;
        }

        .key {
            background: #e0e0e0;
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 4px 0 #b0b0b0;
        }

        .key.wasd {
            background: #8e44ad;
            color: white;
            box-shadow: 0 4px 0 #6c3483;
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-size: 2em;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }

        .game-over.show {
            display: flex;
        }

        .game-over button {
            background: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 0.5em;
            margin-top: 20px;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 20px;
            }
            
            .tile {
                font-size: 1.8em;
            }
            
            .tile-128, .tile-256, .tile-512, .tile-1024, .tile-2048 {
                font-size: 1.2em;
            }
            
            .key {
                width: 40px;
                height: 40px;
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <div class="container">
        <h1>2048</h1>
        <div class="subtitle">Собери плитку 2048</div>

        <!-- Шапка игры -->
        <div class="game-header">
            <div class="score-container">
                <div class="score-label">Счёт</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="best-container">
                <div class="score-label">Рекорд</div>
                <div class="score-value" id="best">0</div>
            </div>
            <button class="new-game-btn" onclick="newGame()">🔄 Новая игра</button>
        </div>

        <!-- Поле игры -->
        <div class="game-container">
            <div class="grid-container">
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
            </div>
            <div class="tile-container" id="tile-container"></div>
            <div class="game-over" id="game-over">
                <div>Игра окончена!</div>
                <button onclick="newGame()">Новая игра</button>
            </div>
        </div>

        <!-- Управление -->
        <div class="controls-info">
            <div class="controls-title">🎮 Управление</div>
            <div class="keys-grid">
                <div class="key-group">
                    <div class="key-row">
                        <div class="key wasd">W</div>
                    </div>
                    <div class="key-row">
                        <div class="key wasd">A</div>
                        <div class="key wasd">S</div>
                        <div class="key wasd">D</div>
                    </div>
                </div>
                <div class="key-group">
                    <div class="key-row">
                        <div class="key">↑</div>
                    </div>
                    <div class="key-row">
                        <div class="key">←</div>
                        <div class="key">↓</div>
                        <div class="key">→</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        // Константы
        const SIZE = 4;
        let board = [];
        let score = 0;
        let best = localStorage.getItem('2048_best') || 0;

        // Инициализация
        function init() {
            board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
            score = 0;
            updateScore();
            addNewTile();
            addNewTile();
            render();
        }

        // Добавление новой плитки
        function addNewTile() {
            const empty = [];
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] === 0) empty.push({x: i, y: j});
                }
            }
            if (empty.length > 0) {
                const {x, y} = empty[Math.floor(Math.random() * empty.length)];
                board[x][y] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        // Отрисовка
        function render() {
            const container = document.getElementById('tile-container');
            container.innerHTML = '';
            
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] !== 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile tile-${board[i][j]}`;
                        tile.style.gridRow = i + 1;
                        tile.style.gridColumn = j + 1;
                        tile.textContent = board[i][j];
                        container.appendChild(tile);
                    }
                }
            }
        }

        // Движение влево
        function moveLeft() {
            let moved = false;
            for (let i = 0; i < SIZE; i++) {
                const row = board[i].filter(val => val !== 0);
                for (let j = 0; j < row.length - 1; j++) {
                    if (row[j] === row[j + 1]) {
                        row[j] *= 2;
                        score += row[j];
                        row.splice(j + 1, 1);
                        moved = true;
                    }
                }
                while (row.length < SIZE) row.push(0);
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] !== row[j]) moved = true;
                    board[i][j] = row[j];
                }
            }
            return moved;
        }

        // Движение вправо
        function moveRight() {
            let moved = false;
            for (let i = 0; i < SIZE; i++) {
                const row = board[i].filter(val => val !== 0).reverse();
                for (let j = 0; j < row.length - 1; j++) {
                    if (row[j] === row[j + 1]) {
                        row[j] *= 2;
                        score += row[j];
                        row.splice(j + 1, 1);
                        moved = true;
                    }
                }
                while (row.length < SIZE) row.push(0);
                row.reverse();
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] !== row[j]) moved = true;
                    board[i][j] = row[j];
                }
            }
            return moved;
        }

        // Движение вверх
        function moveUp() {
            let moved = false;
            for (let j = 0; j < SIZE; j++) {
                const col = [];
                for (let i = 0; i < SIZE; i++) {
                    if (board[i][j] !== 0) col.push(board[i][j]);
                }
                for (let i = 0; i < col.length - 1; i++) {
                    if (col[i] === col[i + 1]) {
                        col[i] *= 2;
                        score += col[i];
                        col.splice(i + 1, 1);
                        moved = true;
                    }
                }
                while (col.length < SIZE) col.push(0);
                for (let i = 0; i < SIZE; i++) {
                    if (board[i][j] !== col[i]) moved = true;
                    board[i][j] = col[i];
                }
            }
            return moved;
        }

        // Движение вниз
        function moveDown() {
            let moved = false;
            for (let j = 0; j < SIZE; j++) {
                const col = [];
                for (let i = 0; i < SIZE; i++) {
                    if (board[i][j] !== 0) col.push(board[i][j]);
                }
                col.reverse();
                for (let i = 0; i < col.length - 1; i++) {
                    if (col[i] === col[i + 1]) {
                        col[i] *= 2;
                        score += col[i];
                        col.splice(i + 1, 1);
                        moved = true;
                    }
                }
                while (col.length < SIZE) col.push(0);
                col.reverse();
                for (let i = 0; i < SIZE; i++) {
                    if (board[i][j] !== col[i]) moved = true;
                    board[i][j] = col[i];
                }
            }
            return moved;
        }

        // Проверка на проигрыш
        function isGameOver() {
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] === 0) return false;
                    if (i < SIZE - 1 && board[i][j] === board[i + 1][j]) return false;
                    if (j < SIZE - 1 && board[i][j] === board[i][j + 1]) return false;
                }
            }
            return true;
        }

        // Обновление счёта
        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > best) {
                best = score;
                localStorage.setItem('2048_best', best);
            }
            document.getElementById('best').textContent = best;
        }

        // Обработка хода
        function move(direction) {
            let moved = false;
            switch(direction) {
                case 'left': moved = moveLeft(); break;
                case 'right': moved = moveRight(); break;
                case 'up': moved = moveUp(); break;
                case 'down': moved = moveDown(); break;
            }
            
            if (moved) {
                addNewTile();
                render();
                updateScore();
                
                if (isGameOver()) {
                    document.getElementById('game-over').classList.add('show');
                }
            }
        }

        // Новая игра
        function newGame() {
            init();
            document.getElementById('game-over').classList.remove('show');
        }

        // Управление с клавиатуры
        document.addEventListener('keydown', function(event) {
            switch(event.key) {
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    event.preventDefault();
                    move('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    event.preventDefault();
                    move('right');
                    break;
                case 'ArrowUp':
                case 'w':
                case 'W':
                    event.preventDefault();
                    move('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    event.preventDefault();
                    move('down');
                    break;
            }
        });

        // Запуск игры
        init();
    </script>
</body>
</html>
