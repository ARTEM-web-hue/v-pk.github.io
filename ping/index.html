<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedtest от Ookla - В ПК!</title>
    
    <!-- Подключаем стили топ-панели -->
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }

        .speedtest-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #1e3c72;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .speedtest-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: #1e3c72;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            width: fit-content;
            margin: 0 auto 30px;
            font-weight: bold;
            font-size: 1.2em;
        }

        .speedtest-badge img {
            height: 30px;
        }

        /* Контейнер для iframe */
        .speedtest-frame {
            width: 100%;
            height: 500px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin: 30px 0;
        }

        /* Результаты теста (будем парсить из iframe) */
        .results-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 40px 0 20px;
        }

        .result-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s;
        }

        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .result-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .result-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        .result-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #1e3c72;
            margin: 5px 0;
        }

        .result-value span {
            font-size: 0.5em;
            color: #999;
        }

        .history-section {
            margin-top: 40px;
            border-top: 2px solid #e0e0e0;
            padding-top: 30px;
        }

        .history-title {
            color: #1e3c72;
            margin-bottom: 20px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: #f8f9fa;
            margin-bottom: 8px;
            border-radius: 10px;
            color: #333;
            font-size: 0.95em;
        }

        .history-item .time {
            color: #666;
        }

        .history-item .results {
            font-weight: bold;
            color: #1e3c72;
        }

        .btn-reset {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .btn-reset:hover {
            background: #2a5298;
        }

        @media (max-width: 700px) {
            .results-summary {
                grid-template-columns: 1fr;
            }
            
            .speedtest-container {
                margin: 20px;
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }

            .speedtest-frame {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <!-- Сюда вставится топ-панель -->
    <div id="top-panel-placeholder"></div>

    <div class="speedtest-container">
        <h1>📡 Speedtest от Ookla</h1>
        <div class="subtitle">Самый точный тест скорости интернета</div>
        
        <!-- Бейдж с официальной символикой -->
        <div class="speedtest-badge">
            <span>⚡</span>
            <span>OOKLA SPEEDTEST</span>
            <span>🌐</span>
        </div>

        <!-- Официальный iframe от Speedtest.net -->
        <iframe 
            class="speedtest-frame" 
            src="https://www.speedtest.net/embed/ru?settings=%7B%22background%22%3A%22white%22%2C%22buttonText%22%3A%22%22%2C%22startText%22%3A%22%D0%9D%D0%B0%D1%87%D0%B0%D1%82%D1%8C%20%D1%82%D0%B5%D1%81%D1%82%22%7D"
            allow="geolocation"
            loading="lazy">
        </iframe>

        <!-- Сохранённые результаты (парсим через postMessage) -->
        <div class="results-summary">
            <div class="result-card">
                <div class="result-icon">📥</div>
                <div class="result-label">Загрузка</div>
                <div class="result-value" id="download-result">—</div>
            </div>
            <div class="result-card">
                <div class="result-icon">📤</div>
                <div class="result-label">Отдача</div>
                <div class="result-value" id="upload-result">—</div>
            </div>
            <div class="result-card">
                <div class="result-icon">⚡</div>
                <div class="result-label">Пинг</div>
                <div class="result-value" id="ping-result">—</div>
            </div>
        </div>

        <!-- Кнопка сохранить результат -->
        <div style="text-align: center; margin: 20px 0;">
            <button class="btn-reset" id="save-result">💾 Сохранить результат</button>
        </div>

        <!-- История тестов -->
        <div class="history-section">
            <h3 class="history-title">📜 История тестов</h3>
            <ul class="history-list" id="history-list">
                <li class="history-item">
                    <span class="time">Ещё нет данных</span>
                    <span class="results">—</span>
                </li>
            </ul>
            <div style="text-align: right;">
                <button class="btn-reset" id="clear-history">🔄 Очистить историю</button>
            </div>
        </div>
    </div>

    <!-- Подключаем скрипт топ-панели -->
    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        class SpeedtestWidget {
            constructor() {
                this.history = this.loadHistory() || [];
                this.currentResult = null;
                
                this.initElements();
                this.addEventListeners();
                this.setupMessageListener();
                this.renderHistory();
            }

            initElements() {
                this.downloadEl = document.getElementById('download-result');
                this.uploadEl = document.getElementById('upload-result');
                this.pingEl = document.getElementById('ping-result');
                this.saveBtn = document.getElementById('save-result');
                this.clearBtn = document.getElementById('clear-history');
                this.historyList = document.getElementById('history-list');
                this.speedtestFrame = document.querySelector('.speedtest-frame');
            }

            addEventListeners() {
                this.saveBtn.addEventListener('click', () => this.saveCurrentResult());
                this.clearBtn.addEventListener('click', () => this.clearHistory());
            }

            setupMessageListener() {
                // Слушаем сообщения от iframe Speedtest
                window.addEventListener('message', (event) => {
                    // Проверяем, что сообщение от Speedtest
                    if (event.origin.includes('speedtest.net')) {
                        try {
                            const data = JSON.parse(event.data);
                            if (data && data.type === 'speedtest' && data.data) {
                                this.updateResults(data.data);
                            }
                        } catch (e) {
                            // Не JSON, игнорируем
                        }
                    }
                });
            }

            updateResults(data) {
                // Парсим результаты из iframe
                if (data.download) {
                    const downloadMbps = (data.download / 1000000).toFixed(1);
                    this.downloadEl.innerHTML = `${downloadMbps} <span>Мбит/с</span>`;
                }
                
                if (data.upload) {
                    const uploadMbps = (data.upload / 1000000).toFixed(1);
                    this.uploadEl.innerHTML = `${uploadMbps} <span>Мбит/с</span>`;
                }
                
                if (data.ping) {
                    this.pingEl.innerHTML = `${data.ping} <span>мс</span>`;
                }

                // Сохраняем текущий результат
                this.currentResult = {
                    download: data.download ? (data.download / 1000000).toFixed(1) : '—',
                    upload: data.upload ? (data.upload / 1000000).toFixed(1) : '—',
                    ping: data.ping || '—',
                    time: new Date().toLocaleTimeString(),
                    date: new Date().toLocaleDateString()
                };
            }

            saveCurrentResult() {
                if (!this.currentResult) {
                    alert('Сначала проведите тест скорости!');
                    return;
                }

                this.history.unshift(this.currentResult);
                
                // Оставляем только последние 10 записей
                if (this.history.length > 10) {
                    this.history.pop();
                }
                
                this.saveHistory();
                this.renderHistory();
            }

            saveHistory() {
                localStorage.setItem('speedtest_history', JSON.stringify(this.history));
            }

            loadHistory() {
                const saved = localStorage.getItem('speedtest_history');
                return saved ? JSON.parse(saved) : [];
            }

            renderHistory() {
                if (this.history.length === 0) {
                    this.historyList.innerHTML = '<li class="history-item"><span class="time">Ещё нет данных</span><span class="results">—</span></li>';
                    return;
                }
                
                this.historyList.innerHTML = this.history.map(item => `
                    <li class="history-item">
                        <span class="time">${item.date} ${item.time}</span>
                        <span class="results">⬇️ ${item.download} | ⬆️ ${item.upload} | ⚡ ${item.ping}</span>
                    </li>
                `).join('');
            }

            clearHistory() {
                if (confirm('Очистить всю историю тестов?')) {
                    this.history = [];
                    localStorage.removeItem('speedtest_history');
                    this.renderHistory();
                }
            }
        }

        // Дополнительный вариант: кнопка для ручного ввода результатов
        class ManualResult {
            constructor() {
                this.addManualInput();
            }

            addManualInput() {
                const container = document.querySelector('.results-summary');
                if (!container) return;

                const manualDiv = document.createElement('div');
                manualDiv.style.marginTop = '20px';
                manualDiv.style.padding = '20px';
                manualDiv.style.background = '#f0f0f0';
                manualDiv.style.borderRadius = '10px';
                manualDiv.innerHTML = `
                    <h4 style="margin:0 0 15px; color:#1e3c72;">✏️ Ручной ввод</h4>
                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:15px;">
                        <input type="number" id="manual-download" placeholder="Загрузка Мбит/с" style="padding:8px; border:1px solid #ccc; border-radius:5px;">
                        <input type="number" id="manual-upload" placeholder="Отдача Мбит/с" style="padding:8px; border:1px solid #ccc; border-radius:5px;">
                        <input type="number" id="manual-ping" placeholder="Пинг мс" style="padding:8px; border:1px solid #ccc; border-radius:5px;">
                    </div>
                    <button id="manual-save" style="background:#1e3c72; color:white; border:none; padding:8px 20px; border-radius:5px; cursor:pointer;">Сохранить</button>
                `;
                
                container.appendChild(manualDiv);

                document.getElementById('manual-save').addEventListener('click', () => {
                    const download = document.getElementById('manual-download').value;
                    const upload = document.getElementById('manual-upload').value;
                    const ping = document.getElementById('manual-ping').value;

                    if (download && upload && ping) {
                        const result = {
                            download: download,
                            upload: upload,
                            ping: ping,
                            time: new Date().toLocaleTimeString(),
                            date: new Date().toLocaleDateString()
                        };

                        // Используем глобальный экземпляр SpeedtestWidget
                        if (window.speedtest) {
                            window.speedtest.currentResult = result;
                            window.speedtest.saveCurrentResult();
                            
                            // Очищаем поля
                            document.getElementById('manual-download').value = '';
                            document.getElementById('manual-upload').value = '';
                            document.getElementById('manual-ping').value = '';
                        }
                    } else {
                        alert('Заполните все поля!');
                    }
                });
            }
        }

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            window.speedtest = new SpeedtestWidget();
            new ManualResult();
        });
    </script>
</body>
</html>
