<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - В ПК!</title>
    
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 600px; /* Увеличено с 500px */
            margin: 40px auto;
            padding: 40px; /* Увеличено */
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 3.5em; /* Увеличено */
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.2em;
        }

        /* Шапка игры */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .score-container, .best-container {
            background: #bbada0;
            padding: 15px 25px; /* Увеличено */
            border-radius: 15px;
            color: white;
            text-align: center;
            min-width: 100px;
        }

        .score-label {
            font-size: 0.9em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .score-value {
            font-size: 2.2em; /* Увеличено */
            font-weight: bold;
        }

        .new-game-btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 15px 30px; /* Увеличено */
            border-radius: 15px;
            font-size: 1.2em; /* Увеличено */
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .new-game-btn:hover {
            background: #9f8a76;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Поле игры - увеличенное */
        .game-container {
            position: relative;
            background: #bbada0;
            border-radius: 20px;
            padding: 20px; /* Увеличено */
            margin-bottom: 30px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Сетка фона */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px; /* Увеличено */
            background: #bbada0;
            border-radius: 15px;
        }

        .grid-cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 15px;
            aspect-ratio: 1 / 1;
            width: 100%;
        }

        /* Контейнер для плиток */
        .tile-container {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            pointer-events: none;
        }

        /* Плитки с точными координатами */
        .tile {
            position: absolute;
            width: calc((100% - 60px) / 4); /* 4 колонки с 3 промежутками по 20px */
            height: calc((100% - 60px) / 4);
            background: #eee4da;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #776e65;
            transition: all 0.15s;
            animation: appear 0.2s;
            font-size: min(4.5vw, 40px); /* Увеличено */
            box-sizing: border-box;
        }

        /* ТОЧНЫЕ ПОЗИЦИИ ДЛЯ КАЖДОЙ КЛЕТКИ */
        .tile.pos-0-0 { top: 0; left: 0; }
        .tile.pos-0-1 { top: 0; left: calc(25% + 15px); }  /* 20px * 3/4 = 15px */
        .tile.pos-0-2 { top: 0; left: calc(50% + 30px); }
        .tile.pos-0-3 { top: 0; left: calc(75% + 45px); }
        
        .tile.pos-1-0 { top: calc(25% + 15px); left: 0; }
        .tile.pos-1-1 { top: calc(25% + 15px); left: calc(25% + 15px); }
        .tile.pos-1-2 { top: calc(25% + 15px); left: calc(50% + 30px); }
        .tile.pos-1-3 { top: calc(25% + 15px); left: calc(75% + 45px); }
        
        .tile.pos-2-0 { top: calc(50% + 30px); left: 0; }
        .tile.pos-2-1 { top: calc(50% + 30px); left: calc(25% + 15px); }
        .tile.pos-2-2 { top: calc(50% + 30px); left: calc(50% + 30px); }
        .tile.pos-2-3 { top: calc(50% + 30px); left: calc(75% + 45px); }
        
        .tile.pos-3-0 { top: calc(75% + 45px); left: 0; }
        .tile.pos-3-1 { top: calc(75% + 45px); left: calc(25% + 15px); }
        .tile.pos-3-2 { top: calc(75% + 45px); left: calc(50% + 30px); }
        .tile.pos-3-3 { top: calc(75% + 45px); left: calc(75% + 45px); }

        /* Цвета плиток */
        .tile-2 { background: #eee4da; }
        .tile-4 { background: #ede0c8; }
        .tile-8 { background: #f2b179; color: white; }
        .tile-16 { background: #f59563; color: white; }
        .tile-32 { background: #f67c5f; color: white; }
        .tile-64 { background: #f65e3b; color: white; }
        .tile-128 { background: #edcf72; color: white; font-size: min(4vw, 35px); }
        .tile-256 { background: #edcc61; color: white; font-size: min(4vw, 35px); }
        .tile-512 { background: #edc850; color: white; font-size: min(4vw, 35px); }
        .tile-1024 { background: #edc53f; color: white; font-size: min(3.5vw, 30px); }
        .tile-2048 { background: #edc22e; color: white; font-size: min(3.5vw, 30px); }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes win {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); background: gold; }
            100% { transform: scale(1); }
        }

        .tile.win {
            animation: win 1s ease-in-out;
        }

        /* Управление */
        .controls-info {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
        }

        .controls-title {
            color: #2c3e50;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .keys-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .key-group {
            text-align: center;
        }

        .key-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 8px 0;
        }

        .key {
            background: #e0e0e0;
            width: 70px; /* Увеличено */
            height: 70px; /* Увеличено */
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em; /* Увеличено */
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 4px 0 #b0b0b0;
        }

        .key.wasd {
            background: #8e44ad;
            color: white;
            box-shadow: 0 4px 0 #6c3483;
        }

        .game-over, .game-win {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-size: 2.5em; /* Увеличено */
            font-weight: bold;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .game-over.show, .game-win.show {
            display: flex;
        }

        .game-win .win-emoji {
            font-size: 2em;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .game-over button, .game-win button {
            background: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 0.5em;
            margin-top: 20px;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 20px;
            }
            
            .key {
                width: 50px;
                height: 50px;
                font-size: 1.3em;
            }
            
            .game-container {
                padding: 15px;
                gap: 15px;
            }
            
            .grid-container {
                gap: 15px;
            }
            
            .tile {
                width: calc((100% - 45px) / 4);
                height: calc((100% - 45px) / 4);
                font-size: min(5vw, 30px);
            }
            
            /* Корректировка позиций для мобильных */
            .tile.pos-0-1 { left: calc(25% + 11.25px); }
            .tile.pos-0-2 { left: calc(50% + 22.5px); }
            .tile.pos-0-3 { left: calc(75% + 33.75px); }
            .tile.pos-1-0 { top: calc(25% + 11.25px); }
            .tile.pos-1-1 { top: calc(25% + 11.25px); left: calc(25% + 11.25px); }
            .tile.pos-1-2 { top: calc(25% + 11.25px); left: calc(50% + 22.5px); }
            .tile.pos-1-3 { top: calc(25% + 11.25px); left: calc(75% + 33.75px); }
            .tile.pos-2-0 { top: calc(50% + 22.5px); }
            .tile.pos-2-1 { top: calc(50% + 22.5px); left: calc(25% + 11.25px); }
            .tile.pos-2-2 { top: calc(50% + 22.5px); left: calc(50% + 22.5px); }
            .tile.pos-2-3 { top: calc(50% + 22.5px); left: calc(75% + 33.75px); }
            .tile.pos-3-0 { top: calc(75% + 33.75px); }
            .tile.pos-3-1 { top: calc(75% + 33.75px); left: calc(25% + 11.25px); }
            .tile.pos-3-2 { top: calc(75% + 33.75px); left: calc(50% + 22.5px); }
            .tile.pos-3-3 { top: calc(75% + 33.75px); left: calc(75% + 33.75px); }
        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <div class="container">
        <h1>2048</h1>
        <div class="subtitle">Собери плитку 2048</div>

        <!-- Шапка игры -->
        <div class="game-header">
            <div class="score-container">
                <div class="score-label">Счёт</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="best-container">
                <div class="score-label">Рекорд</div>
                <div class="score-value" id="best">0</div>
            </div>
            <button class="new-game-btn" onclick="newGame()">🔄 Новая игра</button>
        </div>

        <!-- Поле игры -->
        <div class="game-container">
            <!-- Сетка фона -->
            <div class="grid-container">
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
            
            <!-- Контейнер для плиток -->
            <div class="tile-container" id="tile-container"></div>
            
            <!-- Экран проигрыша -->
            <div class="game-over" id="game-over">
                <div>😵 Игра окончена!</div>
                <button onclick="newGame()">Новая игра</button>
            </div>
            
            <!-- Экран победы -->
            <div class="game-win" id="game-win">
                <div class="win-emoji">🏆</div>
                <div>ТЫ ПОБЕДИЛ!</div>
                <div style="font-size: 0.7em; margin: 10px;">2048 собрано!</div>
                <button onclick="continuePlaying()">Продолжить</button>
                <button onclick="newGame()">Новая игра</button>
            </div>
        </div>

        <!-- Управление -->
        <div class="controls-info">
            <div class="controls-title">🎮 Управление</div>
            <div class="keys-grid">
                <div class="key-group">
                    <div class="key-row"><div class="key wasd">W / Ц</div></div>
                    <div class="key-row">
                        <div class="key wasd">A / Ф</div>
                        <div class="key wasd">S / Ы</div>
                        <div class="key wasd">D / В</div>
                    </div>
                </div>
                <div class="key-group">
                    <div class="key-row"><div class="key">↑</div></div>
                    <div class="key-row">
                        <div class="key">←</div>
                        <div class="key">↓</div>
                        <div class="key">→</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        const SIZE = 4;
        let board = [];
        let score = 0;
        let best = localStorage.getItem('2048_best') || 0;
        let gameWon = false;

        function init() {
            board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
            score = 0;
            gameWon = false;
            updateScore();
            addNewTile();
            addNewTile();
            render();
            document.getElementById('game-over').classList.remove('show');
            document.getElementById('game-win').classList.remove('show');
        }

        function addNewTile() {
            const empty = [];
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] === 0) empty.push({x: i, y: j});
                }
            }
            if (empty.length > 0) {
                const {x, y} = empty[Math.floor(Math.random() * empty.length)];
                board[x][y] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function render() {
            const container = document.getElementById('tile-container');
            container.innerHTML = '';
            
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] !== 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile tile-${board[i][j]} pos-${i}-${j}`;
                        tile.textContent = board[i][j];
                        container.appendChild(tile);
                    }
                }
            }
        }

        function moveLeft() {
            let moved = false;
            for (let i = 0; i < SIZE; i++) {
                const row = board[i].filter(val => val !== 0);
                for (let j = 0; j < row.length - 1; j++) {
                    if (row[j] === row[j + 1]) {
                        row[j] *= 2;
                        score += row[j];
                        row.splice(j + 1, 1);
                        moved = true;
                    }
                }
                while (row.length < SIZE) row.push(0);
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] !== row[j]) moved = true;
                    board[i][j] = row[j];
                }
            }
            return moved;
        }

        function moveRight() {
            let moved = false;
            for (let i = 0; i < SIZE; i++) {
                const row = board[i].filter(val => val !== 0).reverse();
                for (let j = 0; j < row.length - 1; j++) {
                    if (row[j] === row[j + 1]) {
                        row[j] *= 2;
                        score += row[j];
                        row.splice(j + 1, 1);
                        moved = true;
                    }
                }
                while (row.length < SIZE) row.push(0);
                row.reverse();
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] !== row[j]) moved = true;
                    board[i][j] = row[j];
                }
            }
            return moved;
        }

        function moveUp() {
            let moved = false;
            for (let j = 0; j < SIZE; j++) {
                const col = [];
                for (let i = 0; i < SIZE; i++) {
                    if (board[i][j] !== 0) col.push(board[i][j]);
                }
                for (let i = 0; i < col.length - 1; i++) {
                    if (col[i] === col[i + 1]) {
                        col[i] *= 2;
                        score += col[i];
                        col.splice(i + 1, 1);
                        moved = true;
                    }
                }
                while (col.length < SIZE) col.push(0);
                for (let i = 0; i < SIZE; i++) {
                    if (board[i][j] !== col[i]) moved = true;
                    board[i][j] = col[i];
                }
            }
            return moved;
        }

        function moveDown() {
            let moved = false;
            for (let j = 0; j < SIZE; j++) {
                const col = [];
                for (let i = 0; i < SIZE; i++) {
                    if (board[i][j] !== 0) col.push(board[i][j]);
                }
                col.reverse();
                for (let i = 0; i < col.length - 1; i++) {
                    if (col[i] === col[i + 1]) {
                        col[i] *= 2;
                        score += col[i];
                        col.splice(i + 1, 1);
                        moved = true;
                    }
                }
                while (col.length < SIZE) col.push(0);
                col.reverse();
                for (let i = 0; i < SIZE; i++) {
                    if (board[i][j] !== col[i]) moved = true;
                    board[i][j] = col[i];
                }
            }
            return moved;
        }

        function checkWin() {
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] === 2048 && !gameWon) {
                        gameWon = true;
                        document.getElementById('game-win').classList.add('show');
                        setTimeout(() => {
                            const tiles = document.querySelectorAll('.tile-2048');
                            tiles.forEach(t => t.classList.add('win'));
                        }, 100);
                        return true;
                    }
                }
            }
            return false;
        }

        function isGameOver() {
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] === 0) return false;
                    if (i < SIZE - 1 && board[i][j] === board[i + 1][j]) return false;
                    if (j < SIZE - 1 && board[i][j] === board[i][j + 1]) return false;
                }
            }
            return true;
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > best) {
                best = score;
                localStorage.setItem('2048_best', best);
            }
            document.getElementById('best').textContent = best;
        }

        function continuePlaying() {
            document.getElementById('game-win').classList.remove('show');
        }

        function move(direction) {
            let moved = false;
            switch(direction) {
                case 'left': moved = moveLeft(); break;
                case 'right': moved = moveRight(); break;
                case 'up': moved = moveUp(); break;
                case 'down': moved = moveDown(); break;
            }
            
            if (moved) {
                addNewTile();
                render();
                updateScore();
                checkWin();
                if (isGameOver() && !gameWon) {
                    document.getElementById('game-over').classList.add('show');
                }
            }
        }

        function newGame() {
            init();
        }

        document.addEventListener('keydown', function(event) {
            const key = event.key;
            if (key === 'ArrowLeft' || key === 'a' || key === 'A' || key === 'ф' || key === 'Ф') {
                event.preventDefault();
                move('left');
            }
            else if (key === 'ArrowRight' || key === 'd' || key === 'D' || key === 'в' || key === 'В') {
                event.preventDefault();
                move('right');
            }
            else if (key === 'ArrowUp' || key === 'w' || key === 'W' || key === 'ц' || key === 'Ц') {
                event.preventDefault();
                move('up');
            }
            else if (key === 'ArrowDown' || key === 's' || key === 'S' || key === 'ы' || key === 'Ы') {
                event.preventDefault();
                move('down');
            }
        });

        init();
    </script>
</body>
</html>
