<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест на дабл-клик - В ПК!</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            min-height: 100vh;
        }

        .doubleclick-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #c0392b;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .test-area {
            text-align: center;
            margin: 40px 0;
        }

        .test-button {
            width: 300px;
            height: 300px;
            margin: 0 auto;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
            color: white;
            border: 4px solid rgba(255,255,255,0.3);
            transition: all 0.1s;
            user-select: none;
        }

        .test-button:active {
            transform: scale(0.95);
        }

        .test-button.waiting {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
        }

        .test-button.active {
            animation: pulse-red 1s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            50% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        .main-text {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .sub-text {
            font-size: 18px;
            opacity: 0.9;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 40px 0;
        }

        .result-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .result-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .result-label {
            color: #7f8c8d;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        .result-value {
            font-size: 2em;
            font-weight: bold;
            color: #2c3e50;
            margin: 10px 0;
        }

        .result-value.warning {
            color: #e74c3c;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .mouse-status {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 30px 0;
            text-align: center;
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .status-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .mouse-good {
            color: #27ae60;
        }

        .mouse-bad {
            color: #e74c3c;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            margin: 5px;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .history-section {
            margin-top: 40px;
            border-top: 2px solid #e0e0e0;
            padding-top: 30px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #f8f9fa;
            margin-bottom: 8px;
            border-radius: 10px;
        }

        .history-item .bad {
            color: #e74c3c;
            font-weight: bold;
        }

        .history-item .good {
            color: #27ae60;
        }

        @media (max-width: 600px) {
            .test-button {
                width: 250px;
                height: 250px;
            }
            
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <div class="doubleclick-container">
        <h1>🖱️ Тест на дабл-клик</h1>
        <div class="subtitle">Просто начни кликать по кнопке</div>

        <div class="test-area">
            <div class="test-button" id="test-button">
                <div class="main-text" id="main-text">Кликни</div>
                <div class="sub-text" id="sub-text">Нажми чтобы начать</div>
            </div>
        </div>

        <div class="results-grid">
            <div class="result-card">
                <div class="result-icon">🖱️</div>
                <div class="result-label">Всего кликов</div>
                <div class="result-value" id="total-clicks">0</div>
            </div>

            <div class="result-card">
                <div class="result-icon">⚡</div>
                <div class="result-label">Дабл-клики</div>
                <div class="result-value" id="double-clicks">0</div>
            </div>

            <div class="result-card">
                <div class="result-icon">📊</div>
                <div class="result-label">Процент</div>
                <div class="result-value" id="double-percent">0%</div>
            </div>

            <div class="result-card">
                <div class="result-icon">⏱️</div>
                <div class="result-label">Средний интервал</div>
                <div class="result-value" id="avg-interval">0</div>
            </div>
        </div>

        <div class="mouse-status" id="mouse-status">
            <div class="status-icon" id="status-icon">🖱️</div>
            <div class="status-title" id="status-title">Нажми на кнопку</div>
            <div class="status-description" id="status-description">
                Кликай как обычно, мышь сама определит проблему
            </div>
        </div>

        <div style="text-align: center;">
            <button class="btn btn-secondary" id="reset-test">🔄 Сбросить тест</button>
        </div>

        <div class="history-section">
            <h3>📜 Последние тесты</h3>
            <ul class="history-list" id="history-list">
                <li class="history-item">Ещё нет данных</li>
            </ul>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        class DoubleClickTest {
            constructor() {
                this.testActive = false;
                this.clicks = [];
                this.doubleClicks = 0;
                this.doubleThreshold = 80;
                
                this.history = JSON.parse(localStorage.getItem('doubleclick_history')) || [];
                
                this.initElements();
                this.addEventListeners();
                this.renderHistory();
            }

            initElements() {
                this.button = document.getElementById('test-button');
                this.mainText = document.getElementById('main-text');
                this.subText = document.getElementById('sub-text');
                
                this.totalClicksEl = document.getElementById('total-clicks');
                this.doubleClicksEl = document.getElementById('double-clicks');
                this.doublePercentEl = document.getElementById('double-percent');
                this.avgIntervalEl = document.getElementById('avg-interval');
                
                this.statusIcon = document.getElementById('status-icon');
                this.statusTitle = document.getElementById('status-title');
                this.statusDesc = document.getElementById('status-description');
                
                this.resetBtn = document.getElementById('reset-test');
                this.historyList = document.getElementById('history-list');
            }

            addEventListeners() {
                this.button.addEventListener('click', () => this.handleClick());
                this.resetBtn.addEventListener('click', () => this.resetTest());
            }

            handleClick() {
                // Если тест не активен - запускаем
                if (!this.testActive) {
                    this.startTest();
                }
                
                const now = Date.now();
                this.clicks.push(now);
                
                if (this.clicks.length > 1) {
                    const lastClick = this.clicks[this.clicks.length - 2];
                    const interval = now - lastClick;
                    
                    if (interval < this.doubleThreshold) {
                        this.doubleClicks++;
                        
                        this.button.style.backgroundColor = '#ff6b6b';
                        setTimeout(() => {
                            this.button.style.backgroundColor = '';
                        }, 100);
                    }
                }
                
                if (this.clicks.length > 50) {
                    this.clicks = this.clicks.slice(-50);
                }
                
                this.updateStats();
                this.checkMouseStatus();
            }

            startTest() {
                this.testActive = true;
                this.clicks = [];
                this.doubleClicks = 0;
                
                this.button.classList.remove('waiting');
                this.button.classList.add('active');
                this.mainText.textContent = 'Кликай!';
                this.subText.textContent = 'Продолжай кликать';
                
                this.statusIcon.textContent = '⚡';
                this.statusTitle.textContent = 'Тест идёт...';
                this.statusDesc.textContent = 'Кликай в кнопку выше';
            }

            updateStats() {
                const total = this.clicks.length;
                const double = this.doubleClicks;
                
                this.totalClicksEl.textContent = total;
                this.doubleClicksEl.textContent = double;
                
                const percent = total > 0 ? ((double / total) * 100).toFixed(1) : 0;
                this.doublePercentEl.textContent = percent + '%';
                
                if (total > 1) {
                    let sumIntervals = 0;
                    for (let i = 1; i < total; i++) {
                        sumIntervals += this.clicks[i] - this.clicks[i-1];
                    }
                    const avg = Math.round(sumIntervals / (total - 1));
                    this.avgIntervalEl.textContent = avg + ' мс';
                    
                    if (percent > 5) {
                        this.doublePercentEl.classList.add('warning');
                    } else {
                        this.doublePercentEl.classList.remove('warning');
                    }
                }
            }

            checkMouseStatus() {
                if (this.clicks.length < 5) return;
                
                const total = this.clicks.length;
                const double = this.doubleClicks;
                const doubleRate = (double / total) * 100;
                
                if (doubleRate > 15) {
                    this.statusIcon.textContent = '⚠️';
                    this.statusTitle.textContent = 'Мышь ДАБЛ-КЛИКАЕТ!';
                    this.statusTitle.className = 'mouse-bad';
                    this.statusDesc.textContent = 'Обнаружено много двойных кликов. Пора менять микрик!';
                } else if (doubleRate > 5) {
                    this.statusIcon.textContent = '🖱️';
                    this.statusTitle.textContent = 'Начинает двоиться';
                    this.statusTitle.className = '';
                    this.statusDesc.textContent = 'Изредка появляются двойные клики. Скоро потребуется замена.';
                } else {
                    this.statusIcon.textContent = '✅';
                    this.statusTitle.textContent = 'Мышь в порядке';
                    this.statusTitle.className = 'mouse-good';
                    this.statusDesc.textContent = 'Дабл-кликов не обнаружено. Всё отлично!';
                }
            }

            resetTest() {
                if (this.clicks.length >= 5) {
                    this.saveToHistory();
                }
                
                this.testActive = false;
                this.clicks = [];
                this.doubleClicks = 0;
                
                this.button.classList.remove('active');
                this.button.classList.add('waiting');
                this.mainText.textContent = 'Кликни';
                this.subText.textContent = 'Нажми чтобы начать';
                
                this.totalClicksEl.textContent = '0';
                this.doubleClicksEl.textContent = '0';
                this.doublePercentEl.textContent = '0%';
                this.avgIntervalEl.textContent = '0';
                
                this.doublePercentEl.classList.remove('warning');
                
                this.statusIcon.textContent = '🖱️';
                this.statusTitle.textContent = 'Нажми на кнопку';
                this.statusTitle.className = '';
                this.statusDesc.textContent = 'Кликай как обычно, мышь сама определит проблему';
            }

            saveToHistory() {
                const total = this.clicks.length;
                const double = this.doubleClicks;
                const doubleRate = ((double / total) * 100).toFixed(1);
                
                const historyItem = {
                    date: new Date().toLocaleDateString(),
                    time: new Date().toLocaleTimeString(),
                    total: total,
                    double: double,
                    rate: doubleRate,
                    status: doubleRate > 15 ? 'bad' : 'good'
                };
                
                this.history.unshift(historyItem);
                if (this.history.length > 10) {
                    this.history.pop();
                }
                
                localStorage.setItem('doubleclick_history', JSON.stringify(this.history));
                this.renderHistory();
            }

            renderHistory() {
                if (this.history.length === 0) {
                    this.historyList.innerHTML = '<li class="history-item">Ещё нет данных</li>';
                    return;
                }
                
                this.historyList.innerHTML = this.history.map(item => `
                    <li class="history-item">
                        <span>${item.date} ${item.time}</span>
                        <span class="${item.status === 'bad' ? 'bad' : 'good'}">
                            ${item.rate}% (${item.double}/${item.total})
                        </span>
                    </li>
                `).join('');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new DoubleClickTest();
        });
    </script>
</body>
</html>
