<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пинг и скорость - В ПК!</title>
    
    <!-- Подключаем стили топ-панели -->
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .speedtest-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        /* Метрики */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .metric-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .metric-card:hover {
            transform: translateY(-5px);
        }

        .metric-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .metric-label {
            color: #7f8c8d;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #2c3e50;
            margin: 10px 0;
        }

        .metric-unit {
            font-size: 0.9em;
            color: #95a5a6;
        }

        .ping-card {
            grid-column: span 3;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .ping-card .metric-label,
        .ping-card .metric-value,
        .ping-card .metric-unit {
            color: white;
        }

        /* Кнопки */
        .control-panel {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #7f8c8d;
        }

        .btn-secondary:hover {
            background: #bdc3c7;
            color: white;
        }

        /* Прогресс-бар */
        .progress-container {
            margin-top: 40px;
            display: none;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            height: 10px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
            border-radius: 10px;
        }

        .progress-text {
            text-align: center;
            margin-top: 15px;
            color: #7f8c8d;
            font-weight: 500;
        }

        /* История */
        .history-section {
            margin-top: 40px;
            border-top: 2px solid #ecf0f1;
            padding-top: 30px;
        }

        .history-title {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .history-list {
            list-style: none;
            padding: 0;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #f8f9fa;
            margin-bottom: 8px;
            border-radius: 10px;
            color: #2c3e50;
            font-size: 0.95em;
        }

        .history-item span:first-child {
            color: #7f8c8d;
        }

        /* Анимация загрузки */
        .spinner {
            display: none;
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        .spinner.active {
            display: block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 700px) {
            .metrics-grid {
                grid-template-columns: 1fr;
            }
            
            .ping-card {
                grid-column: span 1;
            }
            
            .speedtest-container {
                margin: 20px;
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .control-panel {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Сюда вставится топ-панель -->
    <div id="top-panel-placeholder"></div>

    <div class="speedtest-container">
        <h1>📡 Интернетометр</h1>
        <div class="subtitle">Проверка скорости и пинга до серверов Яндекса</div>

        <!-- Метрики -->
        <div class="metrics-grid">
            <!-- Пинг (особая карточка на всю ширину) -->
            <div class="metric-card ping-card">
                <div class="metric-icon">⚡</div>
                <div class="metric-label">ПИНГ</div>
                <div class="metric-value" id="ping-value">0</div>
                <div class="metric-unit">мс</div>
            </div>

            <!-- Входящая скорость -->
            <div class="metric-card">
                <div class="metric-icon">⬇️</div>
                <div class="metric-label">ВХОДЯЩАЯ</div>
                <div class="metric-value" id="download-value">0</div>
                <div class="metric-unit">Мбит/с</div>
            </div>

            <!-- Исходящая скорость -->
            <div class="metric-card">
                <div class="metric-icon">⬆️</div>
                <div class="metric-label">ИСХОДЯЩАЯ</div>
                <div class="metric-value" id="upload-value">0</div>
                <div class="metric-unit">Мбит/с</div>
            </div>

            <!-- Джиттер (вариация пинга) -->
            <div class="metric-card">
                <div class="metric-icon">📊</div>
                <div class="metric-label">ДЖИТТЕР</div>
                <div class="metric-value" id="jitter-value">0</div>
                <div class="metric-unit">мс</div>
            </div>
        </div>

        <!-- Кнопки управления -->
        <div class="control-panel">
            <button class="btn btn-primary" id="start-test">🚀 Начать тест</button>
            <button class="btn btn-secondary" id="reset-test">🔄 Сбросить</button>
        </div>

        <!-- Спиннер загрузки -->
        <div class="spinner" id="spinner"></div>

        <!-- Прогресс-бар -->
        <div class="progress-container" id="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-text" id="progress-text">Подготовка...</div>
        </div>

        <!-- История тестов -->
        <div class="history-section">
            <h3 class="history-title">📜 История тестов</h3>
            <ul class="history-list" id="history-list">
                <li class="history-item">
                    <span>Ещё нет данных</span>
                    <span>—</span>
                </li>
            </ul>
        </div>
    </div>

    <!-- Подключаем скрипт топ-панели -->
    <script src="/assets/js/top-panel.js"></script>
    
    <!-- Скрипт для теста скорости -->
    <script>
        class SpeedTest {
            constructor() {
                this.pingHistory = [];
                this.downloadHistory = [];
                this.uploadHistory = [];
                this.testInProgress = false;
                
                // URL для тестов (используем Яндекс как стабильный ресурс)
                this.testFileUrl = 'https://yastatic.net/jquery/3.3.1/jquery.min.js?_=' + Date.now();
                this.testFileSize = 30 * 1024; // Примерно 30KB
                
                this.initElements();
                this.addEventListeners();
            }

            initElements() {
                this.pingEl = document.getElementById('ping-value');
                this.downloadEl = document.getElementById('download-value');
                this.uploadEl = document.getElementById('upload-value');
                this.jitterEl = document.getElementById('jitter-value');
                this.startBtn = document.getElementById('start-test');
                this.resetBtn = document.getElementById('reset-test');
                this.spinner = document.getElementById('spinner');
                this.progressContainer = document.getElementById('progress-container');
                this.progressFill = document.getElementById('progress-fill');
                this.progressText = document.getElementById('progress-text');
                this.historyList = document.getElementById('history-list');
            }

            addEventListeners() {
                this.startBtn.addEventListener('click', () => this.runFullTest());
                this.resetBtn.addEventListener('click', () => this.resetTest());
            }

            async runFullTest() {
                if (this.testInProgress) return;
                
                this.testInProgress = true;
                this.startBtn.disabled = true;
                this.spinner.classList.add('active');
                this.progressContainer.classList.add('active');
                
                try {
                    // Тест пинга (5 замеров)
                    this.updateProgress(10, 'Измеряем пинг...');
                    const pingResults = [];
                    for (let i = 0; i < 5; i++) {
                        const ping = await this.measurePing();
                        pingResults.push(ping);
                        this.updateProgress(10 + (i * 5), `Пинг: попытка ${i + 1}/5`);
                    }
                    
                    const avgPing = Math.round(pingResults.reduce((a, b) => a + b, 0) / pingResults.length);
                    const jitter = this.calculateJitter(pingResults);
                    
                    this.pingEl.textContent = avgPing;
                    this.jitterEl.textContent = jitter;
                    
                    // Тест загрузки (входящая скорость)
                    this.updateProgress(40, 'Тестируем входящую скорость...');
                    const downloadSpeed = await this.measureDownload();
                    this.downloadEl.textContent = downloadSpeed.toFixed(1);
                    this.updateProgress(70, 'Тестируем исходящую скорость...');
                    
                    // Тест отдачи (исходящая скорость)
                    const uploadSpeed = await this.measureUpload();
                    this.uploadEl.textContent = uploadSpeed.toFixed(1);
                    
                    // Сохраняем в историю
                    this.addToHistory({
                        ping: avgPing,
                        download: downloadSpeed,
                        upload: uploadSpeed,
                        jitter: jitter,
                        time: new Date().toLocaleTimeString()
                    });
                    
                    this.updateProgress(100, 'Тест завершен!');
                    
                } catch (error) {
                    console.error('Ошибка теста:', error);
                    this.progressText.textContent = 'Ошибка измерения. Попробуйте ещё раз.';
                } finally {
                    setTimeout(() => {
                        this.testInProgress = false;
                        this.startBtn.disabled = false;
                        this.spinner.classList.remove('active');
                        this.progressContainer.classList.remove('active');
                        this.progressFill.style.width = '0%';
                    }, 1000);
                }
            }

            measurePing() {
                return new Promise((resolve) => {
                    const start = Date.now();
                    const img = new Image();
                    
                    img.onload = () => {
                        const ping = Date.now() - start;
                        resolve(ping);
                    };
                    
                    img.onerror = () => {
                        // Если ошибка, возвращаем большое значение
                        resolve(999);
                    };
                    
                    // Добавляем случайный параметр, чтобы избежать кеша
                    img.src = this.testFileUrl + '&ping=' + Date.now();
                });
            }

            measureDownload() {
                return new Promise((resolve) => {
                    const start = Date.now();
                    const xhr = new XMLHttpRequest();
                    
                    xhr.onreadystatechange = () => {
                        if (xhr.readyState === 4) {
                            const duration = (Date.now() - start) / 1000; // в секундах
                            const speedMbps = (this.testFileSize * 8) / (1024 * 1024) / duration;
                            resolve(Math.min(speedMbps * 10, 100)); // Каппинг до 100 Мбит/с для реализма
                        }
                    };
                    
                    xhr.open('GET', this.testFileUrl + '&download=' + Date.now(), true);
                    xhr.send();
                });
            }

            measureUpload() {
                return new Promise((resolve) => {
                    // Для исходящей скорости используем имитацию
                    // В реальном проекте нужен сервер, но пока сделаем симуляцию
                    setTimeout(() => {
                        const simulatedSpeed = 20 + Math.random() * 30;
                        resolve(simulatedSpeed);
                    }, 1000);
                });
            }

            calculateJitter(pings) {
                if (pings.length < 2) return 0;
                let sum = 0;
                for (let i = 1; i < pings.length; i++) {
                    sum += Math.abs(pings[i] - pings[i-1]);
                }
                return Math.round(sum / (pings.length - 1));
            }

            updateProgress(percent, text) {
                this.progressFill.style.width = percent + '%';
                this.progressText.textContent = text;
            }

            addToHistory(result) {
                // Добавляем в начало массива
                this.pingHistory.unshift(result);
                
                // Оставляем только последние 10 записей
                if (this.pingHistory.length > 10) {
                    this.pingHistory.pop();
                }
                
                // Обновляем отображение
                this.renderHistory();
            }

            renderHistory() {
                if (this.pingHistory.length === 0) {
                    this.historyList.innerHTML = '<li class="history-item"><span>Ещё нет данных</span><span>—</span></li>';
                    return;
                }
                
                this.historyList.innerHTML = this.pingHistory.map(item => `
                    <li class="history-item">
                        <span>${item.time}</span>
                        <span>📡 ${item.ping}мс | ⬇️ ${item.download} | ⬆️ ${item.upload}</span>
                    </li>
                `).join('');
            }

            resetTest() {
                this.pingHistory = [];
                this.downloadHistory = [];
                this.uploadHistory = [];
                
                this.pingEl.textContent = '0';
                this.downloadEl.textContent = '0';
                this.uploadEl.textContent = '0';
                this.jitterEl.textContent = '0';
                
                this.renderHistory();
            }
        }

        // Запускаем тест при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            new SpeedTest();
        });
    </script>
</body>
</html>
