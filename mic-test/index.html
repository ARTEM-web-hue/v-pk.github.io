<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест микрофона - В ПК!</title>
    
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.8em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            font-size: 1.2em;
        }

        /* Карточка микрофона */
        .mic-card {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        /* Выбор устройства */
        .device-selector {
            margin-bottom: 30px;
        }

        .device-selector label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #2c3e50;
            font-size: 1.1em;
        }

        .device-selector select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1.1em;
            background: white;
            cursor: pointer;
        }

        .device-selector select:focus {
            border-color: #3498db;
            outline: none;
        }

        /* Статус */
        .permission-status {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .status-icon {
            font-size: 2em;
        }

        .status-text {
            color: #2c3e50;
            font-size: 1.1em;
        }

        .status-text .denied {
            color: #e74c3c;
            font-weight: bold;
        }

        .status-text .granted {
            color: #27ae60;
            font-weight: bold;
        }

        /* График */
        .visualizer-container {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .visualizer-title {
            color: white;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .volume-level {
            color: #00ff9d;
        }

        #visualizer {
            width: 100%;
            height: 200px;
            background: #0f0f1a;
            border-radius: 15px;
        }

        /* Кнопки */
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(52,152,219,0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(46,204,113,0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(231,76,60,0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #2c3e50;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Плеер записи */
        .playback-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            text-align: center;
        }

        .playback-title {
            color: #2c3e50;
            font-size: 1.2em;
            margin-bottom: 15px;
        }

        audio {
            width: 100%;
            margin: 10px 0;
        }

        /* Индикаторы */
        .indicators {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 15px;
        }

        .indicator {
            flex: 1;
            text-align: center;
        }

        .indicator-label {
            color: #7f8c8d;
            font-size: 0.9em;
        }

        .indicator-value {
            color: #2c3e50;
            font-size: 1.5em;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .button-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <div class="container">
        <h1>🎤 Тест микрофона</h1>
        <div class="subtitle">Проверь и протестируй свой микрофон</div>

        <div class="mic-card">
            <!-- Выбор устройства -->
            <div class="device-selector">
                <label>🎙️ Выберите микрофон:</label>
                <select id="micSelect" disabled>
                    <option>Загрузка устройств...</option>
                </select>
            </div>

            <!-- Статус разрешения -->
            <div class="permission-status" id="permissionStatus">
                <div class="status-icon">🔴</div>
                <div class="status-text">
                    <span>Необходимо разрешение на доступ к микрофону</span>
                </div>
            </div>

            <!-- Визуализатор -->
            <div class="visualizer-container">
                <div class="visualizer-title">
                    <span>📊 Звуковой сигнал</span>
                    <span class="volume-level" id="volumeLevel">-∞ дБ</span>
                </div>
                <canvas id="visualizer" width="800" height="200"></canvas>
            </div>

            <!-- Индикаторы -->
            <div class="indicators">
                <div class="indicator">
                    <div class="indicator-label">Частота дискретизации</div>
                    <div class="indicator-value" id="sampleRate">—</div>
                </div>
                <div class="indicator">
                    <div class="indicator-label">Количество каналов</div>
                    <div class="indicator-value" id="channels">—</div>
                </div>
                <div class="indicator">
                    <div class="indicator-label">Макс. громкость</div>
                    <div class="indicator-value" id="maxVolume">—</div>
                </div>
            </div>

            <!-- Кнопки управления -->
            <div class="button-group">
                <button class="btn btn-primary" id="requestBtn" onclick="requestMicrophone()">
                    🎤 Запросить доступ
                </button>
                <button class="btn btn-success" id="startBtn" onclick="startListening()" disabled>
                    ▶️ Начать слушать
                </button>
                <button class="btn btn-danger" id="stopBtn" onclick="stopListening()" disabled>
                    ⏹️ Остановить
                </button>
                <button class="btn btn-secondary" id="recordBtn" onclick="startRecording()" disabled>
                    ⏺️ Записать
                </button>
            </div>

            <!-- Плеер записи -->
            <div class="playback-section" id="playbackSection" style="display: none;">
                <div class="playback-title">🎵 Ваша запись:</div>
                <audio id="playback" controls></audio>
                <button class="btn btn-secondary" onclick="downloadRecording()" style="margin-top: 10px;">
                    ⬇️ Скачать запись
                </button>
            </div>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        // Глобальные переменные
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let mediaStream = null;
        let source = null;
        let animationId = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let devices = [];

        // Canvas элементы
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');

        // Получение списка устройств
        async function getDevices() {
            try {
                const allDevices = await navigator.mediaDevices.enumerateDevices();
                devices = allDevices.filter(device => device.kind === 'audioinput');
                
                const select = document.getElementById('micSelect');
                select.innerHTML = '';
                
                devices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Микрофон ${index + 1}`;
                    select.appendChild(option);
                });
                
                select.disabled = false;
            } catch (error) {
                console.error('Ошибка получения устройств:', error);
            }
        }

        // Запрос доступа к микрофону
        async function requestMicrophone() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    } 
                });
                
                // Обновляем статус
                document.getElementById('permissionStatus').innerHTML = `
                    <div class="status-icon">🟢</div>
                    <div class="status-text">
                        <span class="granted">✓ Доступ разрешён</span>
                    </div>
                `;
                
                // Получаем устройства
                await getDevices();
                
                // Активируем кнопки
                document.getElementById('requestBtn').disabled = true;
                document.getElementById('startBtn').disabled = false;
                
                // Закрываем старый контекст если есть
                if (audioContext) {
                    await audioContext.close();
                }
                
            } catch (error) {
                console.error('Ошибка доступа:', error);
                document.getElementById('permissionStatus').innerHTML = `
                    <div class="status-icon">🔴</div>
                    <div class="status-text">
                        <span class="denied">✗ Доступ запрещён: ${error.message}</span>
                    </div>
                `;
            }
        }

        // Начать прослушивание
        async function startListening() {
            try {
                const deviceId = document.getElementById('micSelect').value;
                
                // Если выбран конкретный микрофон
                if (deviceId && deviceId !== 'Загрузка устройств...') {
                    mediaStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { deviceId: { exact: deviceId } } 
                    });
                }
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                
                source = audioContext.createMediaStreamSource(mediaStream);
                source.connect(analyser);
                
                // Обновляем информацию
                document.getElementById('sampleRate').textContent = audioContext.sampleRate + ' Гц';
                document.getElementById('channels').textContent = source.channelCount;
                
                // Запускаем визуализацию
                draw();
                
                // Обновляем кнопки
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('recordBtn').disabled = false;
                document.getElementById('micSelect').disabled = true;
                
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при запуске: ' + error.message);
            }
        }

        // Остановить прослушивание
        function stopListening() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            if (source) {
                source.disconnect();
            }
            
            if (audioContext) {
                audioContext.close();
            }
            
            // Очищаем canvas
            canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Обновляем кнопки
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('recordBtn').disabled = true;
            document.getElementById('micSelect').disabled = false;
            
            // Сбрасываем громкость
            document.getElementById('volumeLevel').textContent = '-∞ дБ';
        }

        // Рисование визуализатора
        function draw() {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            const WIDTH = canvas.width;
            const HEIGHT = canvas.height;
            
            const drawVisual = () => {
                animationId = requestAnimationFrame(drawVisual);
                
                analyser.getByteFrequencyData(dataArray);
                
                // Вычисляем среднюю громкость
                let sum = 0;
                for (let i = 0; i < bufferLength; i++) {
                    sum += dataArray[i];
                }
                const avgVolume = sum / bufferLength / 255 * 100;
                document.getElementById('volumeLevel').textContent = Math.round(avgVolume) + ' %';
                
                // Находим максимальную громкость
                const maxVolume = Math.max(...dataArray);
                const maxPercent = (maxVolume / 255 * 100).toFixed(1);
                document.getElementById('maxVolume').textContent = maxPercent + '%';
                
                // Рисуем график
                canvasCtx.fillStyle = '#0f0f1a';
                canvasCtx.fillRect(0, 0, WIDTH, HEIGHT);
                
                const barWidth = (WIDTH / bufferLength) * 2.5;
                let x = 0;
                
                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * HEIGHT;
                    
                    // Градиент от зелёного до красного
                    const green = Math.min(255, dataArray[i] * 2);
                    const red = Math.min(255, dataArray[i]);
                    
                    canvasCtx.fillStyle = `rgb(${red}, ${green}, 100)`;
                    canvasCtx.fillRect(x, HEIGHT - barHeight, barWidth, barHeight);
                    
                    x += barWidth + 1;
                }
            };
            
            drawVisual();
        }

        // Запись звука
        function startRecording() {
            recordedChunks = [];
            
            if (!mediaStream) return;
            
            mediaRecorder = new MediaRecorder(mediaStream);
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const audio = document.getElementById('playback');
                audio.src = url;
                
                document.getElementById('playbackSection').style.display = 'block';
                
                // Сохраняем blob для скачивания
                window.lastRecording = blob;
            };
            
            mediaRecorder.start();
            
            // Меняем кнопку на "Стоп записи"
            document.getElementById('recordBtn').textContent = '⏹️ Стоп запись';
            document.getElementById('recordBtn').onclick = stopRecording;
            document.getElementById('recordBtn').classList.remove('btn-secondary');
            document.getElementById('recordBtn').classList.add('btn-danger');
        }

        // Остановка записи
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            
            // Возвращаем кнопку обратно
            document.getElementById('recordBtn').textContent = '⏺️ Записать';
            document.getElementById('recordBtn').onclick = startRecording;
            document.getElementById('recordBtn').classList.remove('btn-danger');
            document.getElementById('recordBtn').classList.add('btn-secondary');
        }

        // Скачивание записи
        function downloadRecording() {
            if (!window.lastRecording) return;
            
            const url = URL.createObjectURL(window.lastRecording);
            const a = document.createElement('a');
            a.href = url;
            a.download = `microphone-${Date.now()}.webm`;
            a.click();
        }

        // Проверка поддержки
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            document.getElementById('permissionStatus').innerHTML = `
                <div class="status-icon">❌</div>
                <div class="status-text">
                    <span class="denied">Ваш браузер не поддерживает доступ к микрофону</span>
                </div>
            `;
            document.getElementById('requestBtn').disabled = true;
        }

        // Получаем устройства при загрузке
        if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
            navigator.mediaDevices.addEventListener('devicechange', getDevices);
        }
    </script>
</body>
</html>
