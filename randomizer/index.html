<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рандомер - В ПК!</title>
    
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 3.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            animation: glow 3s infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(255,255,255,0.3); }
            50% { text-shadow: 0 0 40px rgba(255,215,0,0.5); }
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
            font-size: 1.2em;
            font-style: italic;
        }

        /* Двухколоночный макет */
        .game-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        /* Левая колонка - шар и кнопка */
        .left-column {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Магический шар */
        .magic-ball {
            width: 350px;
            height: 350px;
            margin: 20px auto;
            background: radial-gradient(circle at 30% 30%, #fff, #4a4a8c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(255,255,255,0.3), inset 0 0 50px rgba(255,255,255,0.3);
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
            transition: all 0.3s;
        }

        .magic-ball:hover {
            transform: scale(1.05);
            box-shadow: 0 0 70px rgba(255,215,0,0.5);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .ball-content {
            width: 250px;
            height: 250px;
            background: #2c3e50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .ball-text {
            color: #ecf0f1;
            font-size: 1.8em;
            font-weight: bold;
            text-align: center;
            animation: flicker 0.1s infinite;
            padding: 20px;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px #fff; }
            50% { opacity: 0.8; text-shadow: 0 0 20px gold; }
        }

        /* Кнопка */
        .destiny-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 50px;
            font-size: 1.8em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
            margin: 30px 0;
            width: 100%;
            max-width: 400px;
        }

        .destiny-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(102,126,234,0.6);
        }

        .destiny-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Правая колонка - результат */
        .right-column {
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .result-title {
            color: gold;
            font-size: 2em;
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .result-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .result-image {
            width: 250px;
            height: 250px;
            object-fit: contain;
            margin-bottom: 30px;
            animation: appear 0.5s;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.3));
        }

        .result-name {
            font-size: 2.5em;
            color: white;
            font-weight: bold;
            margin-bottom: 15px;
            animation: slideUp 0.5s;
        }

        .result-desc {
            font-size: 1.5em;
            color: rgba(255,255,255,0.9);
            font-style: italic;
            animation: slideUp 0.5s;
        }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Счётчики */
        .stats-row {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
        }

        .stat-item {
            text-align: center;
            color: white;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.7;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .rare-value {
            color: gold;
        }

        /* История */
        .history-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
        }

        .history-title {
            color: white;
            font-size: 1.3em;
            margin-bottom: 15px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 120px;
            overflow-y: auto;
        }

        .history-item {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 8px;
            margin: 5px 0;
            border-radius: 8px;
            font-size: 0.9em;
        }

        @media (max-width: 900px) {
            .game-layout {
                grid-template-columns: 1fr;
            }
            
            .magic-ball {
                width: 280px;
                height: 280px;
            }
            
            .ball-content {
                width: 200px;
                height: 200px;
            }
            
            .ball-text {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <div class="container">
        <h1>🎱 РАНДОМЕР</h1>
        <div class="subtitle">Узнай свою судьбу... если повезёт</div>

        <!-- Статистика сверху -->
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-label">Всего попыток</div>
                <div class="stat-value" id="totalRolls">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Редких</div>
                <div class="stat-value rare-value" id="rareCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Шанс редкого</div>
                <div class="stat-value" id="rareChance">5%</div>
            </div>
        </div>

        <!-- Двухколоночный макет -->
        <div class="game-layout">
            <!-- Левая колонка - шар и кнопка -->
            <div class="left-column">
                <!-- Магический шар -->
                <div class="magic-ball" id="magicBall" onclick="if(!isRolling) roll()">
                    <div class="ball-content">
                        <div class="ball-text" id="ballText">?</div>
                    </div>
                </div>

                <!-- Кнопка -->
                <button class="destiny-btn" id="rollBtn" onclick="roll()">
                    🎲 УЗНАТЬ СУДЬБУ
                </button>
            </div>

            <!-- Правая колонка - результат -->
            <div class="right-column" id="resultContainer">
                <div class="result-title">✨ ПРЕДСКАЗАНИЕ ✨</div>
                <div class="result-content">
                    <img id="resultImage" class="result-image" src="" alt="" style="display: none;">
                    <div class="result-name" id="resultName">?</div>
                    <div class="result-desc" id="resultDesc">Нажми на шар или кнопку</div>
                </div>
            </div>
        </div>

        <!-- История -->
        <div class="history-section">
            <div class="history-title">📜 История предсказаний</div>
            <ul class="history-list" id="historyList">
                <li class="history-item">Жду твоего выбора...</li>
            </ul>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        // Магические фразы во время ожидания
        const magicPhrases = [
            "✨ Шар думает...",
            "🌀 Вселенная шепчет...",
            "⭐ Звёзды выравниваются...",
            "🔮 Туман рассеивается...",
            "🌙 Луна влияет...",
            "⚡ Энергия накапливается...",
            "🎱 Шар концентрируется...",
            "💫 Судьба решается..."
        ];

        // Варианты результатов
        const results = [
            {
                name: "ЛАСТИК",
                desc: "Ничего не забыл стереть?",
                img: "/assets/eraser.png",
                rare: false
            },
            {
                name: "СЕЙФ",
                desc: "Храни деньги надёжнее...",
                img: "/assets/Ceyf.png",
                rare: false
            },
            {
                name: "МИКРОФОН",
                desc: "Говори громче!",
                img: "/assets/micro.png",
                rare: false
            },
            {
                name: "УВЛАЖНИТЕЛЬ",
                desc: "Воздух влажный???",
                img: "/assets/vlag.png",
                rare: false
            },
            {
                name: "ЛЕКАРСТВО",
                desc: "Не болей",
                img: "lekarstvo.png",
                rare: false
            },
            {
                name: "ХАХАХАХАХАААХАХА",
                desc: "А вот ты и попался :)",
                img: "",
                rare: true
            },
            { name: "КОТ", desc: "Мяу? У тебя кот в судьбе", img: "", rare: false },
            { name: "ПИЦЦА", desc: "Съешь меня сегодня", img: "", rare: false },
            { name: "ДОЖДИК", desc: "Кап-кап... возьми зонт", img: "", rare: false },
            { name: "ЗВЕЗДА", desc: "Загадай желание", img: "", rare: false },
            { name: "ЧАЙ", desc: "Попей чайку", img: "", rare: false },
            { name: "СОН", desc: "Пора спать", img: "", rare: false },
            { name: "Математика", desc: "Считай...", img: "", rare: false },
            { name: "Микроскоп", desc: "Может ты что-то не досмотрел?", img: "", rare: false },
            { name: "Зарядка", desc: "Телефонная или нет?", img: "", rare: false },
            { name: "Самолет", desc: "Вертолёт", img: "", rare: false },
            { name: "Грабли", desc: "Работа...", img: "", rare: false },
            { name: "Утро", desc: "Пора вставать", img: "", rare: false },
        ];

        // Переменные состояния
        let isRolling = false;
        let totalRolls = parseInt(localStorage.getItem('totalRolls')) || 0;
        let rareCount = parseInt(localStorage.getItem('rareCount')) || 0;
        let history = JSON.parse(localStorage.getItem('rollHistory')) || [];

        // Инициализация
        document.getElementById('totalRolls').textContent = totalRolls;
        document.getElementById('rareCount').textContent = rareCount;
        updateHistory();

        // Функция броска
        async function roll() {
            if (isRolling) return;
            
            isRolling = true;
            const btn = document.getElementById('rollBtn');
            const ballText = document.getElementById('ballText');
            const resultContainer = document.getElementById('resultContainer');
            const resultImage = document.getElementById('resultImage');
            const resultName = document.getElementById('resultName');
            const resultDesc = document.getElementById('resultDesc');
            
            btn.disabled = true;
            
            // Анимация магического шара
            for (let i = 0; i < 8; i++) {
                ballText.style.animation = 'flicker 0.1s infinite';
                ballText.textContent = magicPhrases[i % magicPhrases.length];
                await sleep(300);
            }
            
            // Выбираем результат
            const random = Math.random();
            let result;
            
            // Редкий шанс 5%
            if (random < 0.05) {
                result = results.find(r => r.rare === true);
                rareCount++;
                localStorage.setItem('rareCount', rareCount);
                document.getElementById('rareCount').textContent = rareCount;
            } else {
                const normalResults = results.filter(r => !r.rare);
                result = normalResults[Math.floor(Math.random() * normalResults.length)];
            }
            
            // Обновляем счётчики
            totalRolls++;
            localStorage.setItem('totalRolls', totalRolls);
            document.getElementById('totalRolls').textContent = totalRolls;
            
            // Показываем результат
            ballText.style.animation = 'none';
            ballText.textContent = '?';
            
            if (result.img) {
                resultImage.src = result.img;
                resultImage.style.display = 'block';
            } else {
                resultImage.style.display = 'none';
            }
            
            resultName.textContent = result.name;
            resultDesc.textContent = result.desc;
            
            // Добавляем в историю
            addToHistory(result);
            
            btn.disabled = false;
            isRolling = false;
        }

        // Функция задержки
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Добавление в историю
        function addToHistory(result) {
            const time = new Date().toLocaleTimeString();
            history.unshift({
                name: result.name,
                time: time
            });
            
            if (history.length > 8) history.pop();
            
            localStorage.setItem('rollHistory', JSON.stringify(history));
            updateHistory();
        }

        // Обновление истории
        function updateHistory() {
            const list = document.getElementById('historyList');
            
            if (history.length === 0) {
                list.innerHTML = '<li class="history-item">Жду твоего выбора...</li>';
                return;
            }
            
            list.innerHTML = history.map(item => `
                <li class="history-item">
                    ${item.time} — ${item.name}
                </li>
            `).join('');
        }
    </script>
</body>
</html>
