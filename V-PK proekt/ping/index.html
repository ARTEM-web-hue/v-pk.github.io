<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная - В ПК!</title>
    <style>
        /* Базовые стили для топ-панели (ОНИ ДОЛЖНЫ БЫТЬ В КАЖДОМ ФАЙЛЕ) */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        .top-panel {
            background-color: #2c3e50;
            color: white;
            padding: 10px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            gap: 10px;
        }
        
        .logo-img {
            height: 40px;
            width: auto;
        }
        
        .site-title {
            font-size: 24px;
            font-weight: bold;
        }
        
        /* Контент страницы */
        .content {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <!-- Сюда будет вставлена топ-панель -->
    <div id="top-panel-placeholder"></div>

    <!-- Основной контент страницы -->
    <div class="content">
        <h1>Добро пожаловать на главную страницу!</h1>
        <p>Здесь будет основной контент сайта.</p>
    </div>

    <!-- Скрипт для подгрузки топ-панели -->
    <script>
        // Функция для загрузки топ-панели
        async function loadTopPanel() {
            try {
                // ВАЖНО: Загружаем панель прямо с GitHub
                const response = await fetch('https://raw.githubusercontent.com/ARTEM-web-hue/Lichess/refs/heads/main/top-panel.html');
                const html = await response.text();
                document.getElementById('top-panel-placeholder').innerHTML = html;
            } catch (error) {
                console.error('Ошибка загрузки топ-панели:', error);
                // Можно добавить запасной вариант или сообщение для пользователя
                document.getElementById('top-panel-placeholder').innerHTML = '<div style="background: #2c3e50; color:white; padding:10px; text-align:center;">Ошибка загрузки панели</div>';
            }
        }
        
        // Загружаем топ-панель после загрузки страницы
        document.addEventListener('DOMContentLoaded', loadTopPanel);
    </script>
</body>
</html>
