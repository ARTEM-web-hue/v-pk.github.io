<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИИ Генератор сайтов - В ПК!</title>
    
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #8e44ad;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 40px;
        }

        .generator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* Левая панель - ввод */
        .input-panel {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
        }

        .input-panel h2 {
            color: #8e44ad;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2c3e50;
        }

        .form-group input, 
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #8e44ad;
            outline: none;
            box-shadow: 0 0 0 3px rgba(142, 68, 173, 0.1);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .checkbox-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #2c3e50;
        }

        .generate-btn {
            background: linear-gradient(135deg, #8e44ad, #9b59b6);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(142, 68, 173, 0.3);
        }

        .generate-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        /* Правая панель - результат */
        .result-panel {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
        }

        .result-panel h2 {
            color: #8e44ad;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .preview-frame {
            width: 100%;
            height: 400px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            margin-bottom: 15px;
        }

        .code-output {
            background: #2c3e50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #8e44ad;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .success-message {
            background: #2ecc71;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        /* История */
        .history-section {
            margin-top: 40px;
            border-top: 2px solid #e0e0e0;
            padding-top: 30px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #f8f9fa;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .history-item:hover {
            background: #e0e0e0;
        }

        @media (max-width: 800px) {
            .generator-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <div class="container">
        <h1>🤖 Генератор сайтов с ИИ</h1>
        <div class="subtitle">Опиши сайт, и нейросеть создаст его за секунды</div>

        <div class="generator-grid">
            <!-- Левая панель - ввод -->
            <div class="input-panel">
                <h2>📝 Параметры сайта</h2>
                
                <div class="form-group">
                    <label>Что за сайт?</label>
                    <input type="text" id="site-topic" placeholder="Например: кофейня, портфолио, интернет-магазин" value="кофейня">
                </div>

                <div class="form-group">
                    <label>Детали (что должно быть на сайте?)</label>
                    <textarea id="site-details" placeholder="Опиши подробно...">Красивый сайт для кофейни с меню, фотографиями, контактами и формой заказа</textarea>
                </div>

                <div class="form-group">
                    <label>Стиль</label>
                    <select id="site-style">
                        <option value="modern">Современный</option>
                        <option value="minimal">Минимализм</option>
                        <option value="cyber">Киберпанк</option>
                        <option value="nature">Природный</option>
                        <option value="retro">Ретро</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Дополнительно</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" id="adaptive" checked> Адаптивный
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="seo" checked> SEO
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="animations" checked> Анимации
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="dark-mode"> Тёмная тема
                        </label>
                    </div>
                </div>

                <button class="generate-btn" id="generate-btn" onclick="generateSite()">
                    🚀 СГЕНЕРИРОВАТЬ
                </button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px;">ИИ думает... Это займёт около 30 секунд</p>
                </div>
            </div>

            <!-- Правая панель - результат -->
            <div class="result-panel">
                <h2>🎨 Результат</h2>
                
                <iframe id="preview" class="preview-frame" srcdoc="<html><body style='display:flex;justify-content:center;align-items:center;height:100%;font-family:Arial;color:#666;'>Здесь будет сгенерированный сайт</body></html>"></iframe>
                
                <div class="code-output" id="code-output">
                    Нажми "Сгенерировать" чтобы создать сайт
                </div>

                <div id="message-container"></div>
            </div>
        </div>

        <!-- История генераций -->
        <div class="history-section">
            <h2>📜 История генераций</h2>
            <ul class="history-list" id="history-list">
                <li class="history-item">Пока нет сохранённых сайтов</li>
            </ul>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
    // ТВОЙ КЛЮЧ
    const API_KEY = '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';
    
    async function generateSite() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('generate-btn').disabled = true;

        try {
            const topic = document.getElementById('site-topic').value;
            const details = document.getElementById('site-details').value;
            
            const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'HTTP-Referer': 'https://v-pk.vercel.app',  // ТВОЙ САЙТ
                    'X-Title': 'V-PK AI Generator',              // НАЗВАНИЕ
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'google/gemini-2.0-flash-exp:free',  // Бесплатная
                    messages: [{
                        role: 'user',
                        content: `Создай HTML код для сайта: ${topic}. Детали: ${details}`
                    }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }

            const htmlCode = data.choices[0].message.content;
            document.getElementById('preview').srcdoc = htmlCode;

        } catch (error) {
            alert('Ошибка: ' + error.message);
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('generate-btn').disabled = false;
    }
</script>
</body>
</html>
