<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИИ Генератор сайтов - В ПК!</title>
    
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <!-- Подключаем Transformers.js -->
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0"></script>
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #1e3c72;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 40px;
        }

        .model-info {
            background: #f0f4f8;
            border-left: 4px solid #27ae60;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .model-status {
            background: #27ae60;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .generator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .input-panel {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
        }

        .input-panel h2 {
            color: #1e3c72;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2c3e50;
        }

        .form-group input, 
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .generate-btn {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 60, 114, 0.3);
        }

        .generate-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .result-panel {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
        }

        .result-panel h2 {
            color: #1e3c72;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .preview-frame {
            width: 100%;
            height: 400px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            margin-bottom: 15px;
        }

        .code-output {
            background: #2c3e50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e3c72;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            width: 0%;
            transition: width 0.3s;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        @media (max-width: 800px) {
            .generator-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <div class="container">
        <h1>🤖 Локальный ИИ Генератор</h1>
        <div class="subtitle">Модель работает прямо в твоём браузере! Никаких API</div>

        <!-- Статус модели -->
        <div class="model-info" id="model-info">
            <span id="model-status-text">⏳ Загрузка модели...</span>
            <span class="model-status" id="model-status">⏳</span>
        </div>

        <div class="progress-bar" id="progress-bar" style="display: none;">
            <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div class="generator-grid">
            <div class="input-panel">
                <h2>📝 Параметры сайта</h2>
                
                <div class="form-group">
                    <label>Что за сайт?</label>
                    <input type="text" id="site-topic" placeholder="Например: кофейня, портфолио" value="кофейня">
                </div>

                <div class="form-group">
                    <label>Детали</label>
                    <textarea id="site-details" placeholder="Опиши подробно...">Красивый сайт для кофейни с меню, фотографиями и контактами</textarea>
                </div>

                <div class="form-group">
                    <label>Стиль</label>
                    <select id="site-style">
                        <option value="modern">Современный</option>
                        <option value="minimal">Минимализм</option>
                        <option value="cyber">Киберпанк</option>
                    </select>
                </div>

                <button class="generate-btn" id="generate-btn" onclick="generateSite()" disabled>
                    🚀 ЗАГРУЗКА МОДЕЛИ...
                </button>

                <div class="loading" id="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px;">Генерация...</p>
                </div>
            </div>

            <div class="result-panel">
                <h2>🎨 Результат</h2>
                
                <iframe id="preview" class="preview-frame" srcdoc="<html><body style='display:flex;justify-content:center;align-items:center;height:100%;font-family:Arial;color:#666;'>Здесь будет сгенерированный сайт</body></html>"></iframe>
                
                <div class="code-output" id="code-output">
                    Нажми "Сгенерировать"
                </div>

                <div id="message-container"></div>
            </div>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        // Глобальные переменные
        let model = null;
        let tokenizer = null;
        let isModelReady = false;

        // Загружаем модель при старте
        async function loadModel() {
            const statusEl = document.getElementById('model-status');
            const statusText = document.getElementById('model-status-text');
            const progressBar = document.getElementById('progress-bar');
            const progressFill = document.getElementById('progress-fill');
            
            statusEl.textContent = '⏳';
            statusText.textContent = 'Загрузка модели...';
            progressBar.style.display = 'block';

            try {
                // Загружаем токенизатор и модель
                tokenizer = await Transformers.AutoTokenizer.from_pretrained('Xenova/llama2.c-stories15M');
                
                // Симулируем прогресс (реальный прогресс сложно отследить)
                for (let i = 0; i <= 100; i += 10) {
                    progressFill.style.width = i + '%';
                    await new Promise(r => setTimeout(r, 200));
                }

                model = await Transformers.AutoModelForCausalLM.from_pretrained('Xenova/llama2.c-stories15M');
                
                isModelReady = true;
                statusEl.textContent = '✅';
                statusText.textContent = 'Модель загружена! Можно генерировать';
                progressBar.style.display = 'none';
                
                document.getElementById('generate-btn').disabled = false;
                document.getElementById('generate-btn').textContent = '🚀 СГЕНЕРИРОВАТЬ';

            } catch (error) {
                console.error('Ошибка загрузки модели:', error);
                statusEl.textContent = '❌';
                statusText.textContent = 'Ошибка загрузки. Используем демо-режим';
                progressBar.style.display = 'none';
                
                // Переходим в демо-режим
                useDemoMode();
            }
        }

        // Демо-режим если модель не загрузилась
        function useDemoMode() {
            document.getElementById('generate-btn').disabled = false;
            document.getElementById('generate-btn').textContent = '🚀 СГЕНЕРИРОВАТЬ (ДЕМО)';
            
            // Примеры для демо
            window.demoExamples = {
                coffee: '<html>...</html>',
                portfolio: '<html>...</html>',
                cyber: '<html>...</html>'
            };
        }

        // Генерация сайта
        async function generateSite() {
            if (!isModelReady) {
                // Если модель не готова - используем демо
                showDemoResult();
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('generate-btn').disabled = true;

            try {
                const topic = document.getElementById('site-topic').value;
                const details = document.getElementById('site-details').value;
                const style = document.getElementById('site-style').value;

                const prompt = `Создай HTML код для сайта на тему "${topic}". ${details}. Стиль: ${style}. Используй современный CSS. Верни только код.`;

                // Токенизируем промпт
                const inputs = tokenizer(prompt, { return_tensors: 'pt' });
                
                // Генерируем ответ
                const outputs = await model.generate({
                    ...inputs,
                    max_length: 500,
                    temperature: 0.7,
                    do_sample: true,
                });

                // Декодируем результат
                let htmlCode = tokenizer.decode(outputs[0], { skip_special_tokens: true });
                
                // Очищаем от промпта и лишнего
                htmlCode = htmlCode.replace(prompt, '').trim();
                
                // Если код не похож на HTML, используем демо
                if (!htmlCode.includes('<html')) {
                    throw new Error('Модель не сгенерировала HTML');
                }

                document.getElementById('preview').srcdoc = htmlCode;
                document.getElementById('code-output').textContent = htmlCode;

            } catch (error) {
                console.error('Ошибка генерации:', error);
                showDemoResult();
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('generate-btn').disabled = false;
        }

        // Демо-результаты
        function showDemoResult() {
            const style = document.getElementById('site-style').value;
            const topic = document.getElementById('site-topic').value;
            
            let htmlCode = '';
            
            if (style === 'cyber') {
                htmlCode = `<!DOCTYPE html>
<html>
<head><title>Cyber Site</title>
<style>body{background:#0a0e1a;color:#00fff9;font-family:monospace;}</style>
</head>
<body><h1>⚡ КИБЕРПАНК САЙТ</h1><p>Сгенерировано для: ${topic}</p></body>
</html>`;
            } else {
                htmlCode = `<!DOCTYPE html>
<html>
<head><title>${topic}</title>
<style>body{font-family:Arial;background:#f5f5f5;}</style>
</head>
<body><h1>✅ ${topic}</h1><p>${document.getElementById('site-details').value}</p></body>
</html>`;
            }
            
            document.getElementById('preview').srcdoc = htmlCode;
            document.getElementById('code-output').textContent = htmlCode;
        }

        // Загружаем модель при старте
        loadModel();
    </script>
</body>
</html>
