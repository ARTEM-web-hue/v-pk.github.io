<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - В ПК!</title>
    
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="stylesheet" href="/assets/css/top-panel.css">
         
        <style>
            body {
                margin: 0;
                font-family: 'Segoe UI', Arial, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                overflow-x: hidden;
            }
            
            /* Добавим стили для скроллбара */
            ::-webkit-scrollbar {
                width: 12px;
            }
            
            ::-webkit-scrollbar-track {
                background: rgba(255, 255, 255, 0.2);
                border-radius: 10px;
            }
            
            ::-webkit-scrollbar-thumb {
                background: rgba(142, 122, 102, 0.5);
                border-radius: 10px;
            }
            
            ::-webkit-scrollbar-thumb:hover {
                background: rgba(142, 122, 102, 0.7);
            }

        .container {
                    max-width: 600px; /* Увеличено с 500px */
                    margin: 30px auto;
                    padding: 40px; /* Увеличено */
                    background: rgba(255, 255, 255, 0.95);
                    border-radius: 30px;
                    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                    position: relative;
                }

        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 3.5em; /* Увеличено */
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.2em;
        }

        /* Шапка игры */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .score-container, .best-container {
            background: #bbada0;
            padding: 15px 25px; /* Увеличено */
            border-radius: 15px;
            color: white;
            text-align: center;
            min-width: 100px;
        }

        .score-label {
            font-size: 0.9em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .score-value {
            font-size: 2.2em; /* Увеличено */
            font-weight: bold;
        }

        .new-game-btn {
                    background: #8f7a66;
                    color: white;
                    border: none;
                    padding: 15px 30px; /* Увеличено */
                    border-radius: 15px;
                    font-size: 1.2em; /* Увеличено */
                    font-weight: bold;
                    cursor: pointer;
                    transition: all 0.3s;
                    box-shadow: 0 4px 0 #6d5e4d;
                }
                
                .new-game-btn:active {
                    transform: translateY(4px);
                    box-shadow: 0 0 0 #6d5e4d;
                }

        .new-game-btn:hover {
            background: #9f8a76;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Поле игры - увеличенное */
        .game-container {
            position: relative;
            background: #bbada0;
            border-radius: 20px;
            padding: 20px; /* Увеличено */
            margin-bottom: 30px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Сетка фона */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px; /* Увеличено */
            background: #bbada0;
            border-radius: 15px;
        }

        .grid-cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 15px;
            aspect-ratio: 1 / 1;
            width: 100%;
        }

        /* Контейнер для плиток */
                .tile-container {
                    position: absolute;
                    top: 20px;
                    left: 20px;
                    right: 20px;
                    bottom: 20px;
                    pointer-events: none;
                    overflow: hidden; /* Предотвращаем появление артефактов за пределами контейнера */
                    border-radius: 15px; /* Добавляем скругление для соответствия сетке */
                }

        /* Плитки с точными координатами */
                .tile {
                    position: absolute;
                    width: calc((100% - 60px) / 4);
                    height: calc((100% - 60px) / 4);
                    background: #eee4da;
                    border-radius: 15px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-weight: bold;
                    color: #776e65;
                    transition: all 0.05s; /* Уменьшаем продолжительность перехода */
                    font-size: min(4.5vw, 40px);
                    box-sizing: border-box;
                    pointer-events: none;
                    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
                    /* Используем transform для позиционирования вместо top/left */
                }

        /* Позиционирование плиток с использованием transform */
                .tile.pos-0-0 { transform: translate(0, 0); }
                .tile.pos-0-1 { transform: translate(calc(100% + 20px), 0); }
                .tile.pos-0-2 { transform: translate(calc(200% + 40px), 0); }
                .tile.pos-0-3 { transform: translate(calc(300% + 60px), 0); }
                 
                .tile.pos-1-0 { transform: translate(0, calc(100% + 20px)); }
                .tile.pos-1-1 { transform: translate(calc(100% + 20px), calc(100% + 20px)); }
                .tile.pos-1-2 { transform: translate(calc(200% + 40px), calc(100% + 20px)); }
                .tile.pos-1-3 { transform: translate(calc(300% + 60px), calc(100% + 20px)); }
                 
                .tile.pos-2-0 { transform: translate(0, calc(200% + 40px)); }
                .tile.pos-2-1 { transform: translate(calc(100% + 20px), calc(200% + 40px)); }
                .tile.pos-2-2 { transform: translate(calc(200% + 40px), calc(200% + 40px)); }
                .tile.pos-2-3 { transform: translate(calc(300% + 60px), calc(200% + 40px)); }
                 
                .tile.pos-3-0 { transform: translate(0, calc(300% + 60px)); }
                .tile.pos-3-1 { transform: translate(calc(100% + 20px), calc(300% + 60px)); }
                .tile.pos-3-2 { transform: translate(calc(200% + 40px), calc(300% + 60px)); }
                .tile.pos-3-3 { transform: translate(calc(300% + 60px), calc(300% + 60px)); }
        
                /* Убираем анимацию объединения плиток */
                                 .tile.merged {
                                     /* Убираем анимацию, оставляем только визуальный эффект */
                                     transform: scale(1.05);
                                 }
                                 
                                 /* Убираем анимацию появления плиток */
                                 @keyframes appear {
                                     0% { opacity: 1; transform: scale(1); } /* Убираем начальное уменьшение */
                                     100% { opacity: 1; transform: scale(1); }
                                 }

        /* Цвета плиток */
        .tile-2 { background: #eee4da; }
        .tile-4 { background: #ede0c8; }
        .tile-8 { background: #f2b179; color: white; }
        .tile-16 { background: #f59563; color: white; }
        .tile-32 { background: #f67c5f; color: white; }
        .tile-64 { background: #f65e3b; color: white; }
        .tile-128 { background: #edcf72; color: white; font-size: min(4vw, 35px); }
        .tile-256 { background: #edcc61; color: white; font-size: min(4vw, 35px); }
        .tile-512 { background: #edc850; color: white; font-size: min(4vw, 35px); }
        .tile-1024 { background: #edc53f; color: white; font-size: min(3.5vw, 30px); }
        .tile-2048 { background: #edc22e; color: white; font-size: min(3.5vw, 30px); }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes win {
                     0% { transform: scale(1); }
                     100% { transform: scale(1); } /* Убираем анимацию масштабирования */
                 }
         
                 .tile.win {
                     /* Убираем анимацию победы */
                     background: gold;
                 }

        /* Управление */
        .controls-info {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
        }

        .controls-title {
            color: #2c3e50;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .keys-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .key-group {
            text-align: center;
        }

        .key-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 8px 0;
        }

        .key {
            background: #e0e0e0;
            width: 70px; /* Увеличено */
            height: 70px; /* Увеличено */
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em; /* Увеличено */
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 4px 0 #b0b0b0;
        }

        .key.wasd {
            background: #8e44ad;
            color: white;
            box-shadow: 0 4px 0 #6c3483;
        }

        .game-over, .game-win {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-size: 2.5em; /* Увеличено */
            font-weight: bold;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .game-over.show, .game-win.show {
            display: flex;
        }

        .game-win .win-emoji {
            font-size: 2em;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
                     0%, 100% { transform: translateY(0); } /* Убираем анимацию прыжка */
                 }

        .game-over button, .game-win button {
                    background: white;
                    border: none;
                    padding: 15px 30px;
                    border-radius: 15px;
                    font-size: 1.2em;
                    margin-top: 20px;
                    cursor: pointer;
                }

        @media (max-width: 600px) {
                    .container {
                        margin: 20px;
                        padding: 20px;
                    }
                    
                    .key {
                        width: 50px;
                        height: 50px;
                        font-size: 1.3em;
                    }
                    
                    .game-container {
                        padding: 15px;
                        gap: 15px;
                    }
                    
                    .grid-container {
                        gap: 15px;
                    }
                    
                    .tile {
                        width: calc((100% - 45px) / 4);
                        height: calc((100% - 45px) / 4);
                        font-size: min(5vw, 30px);
                    }
                    
                    /* Корректировка позиций для мобильных */
                            .tile.pos-0-1 { transform: translate(calc(100% + 15px), 0); }
                            .tile.pos-0-2 { transform: translate(calc(200% + 30px), 0); }
                            .tile.pos-0-3 { transform: translate(calc(300% + 45px), 0); }
                            .tile.pos-1-0 { transform: translate(0, calc(100% + 15px)); }
                            .tile.pos-1-1 { transform: translate(calc(100% + 15px), calc(100% + 15px)); }
                            .tile.pos-1-2 { transform: translate(calc(200% + 30px), calc(100% + 15px)); }
                            .tile.pos-1-3 { transform: translate(calc(300% + 45px), calc(100% + 15px)); }
                            .tile.pos-2-0 { transform: translate(0, calc(200% + 30px)); }
                            .tile.pos-2-1 { transform: translate(calc(100% + 15px), calc(200% + 30px)); }
                            .tile.pos-2-2 { transform: translate(calc(200% + 30px), calc(200% + 30px)); }
                            .tile.pos-2-3 { transform: translate(calc(300% + 45px), calc(200% + 30px)); }
                            .tile.pos-3-0 { transform: translate(0, calc(300% + 45px)); }
                            .tile.pos-3-1 { transform: translate(calc(100% + 15px), calc(300% + 45px)); }
                            .tile.pos-3-2 { transform: translate(calc(200% + 30px), calc(300% + 45px)); }
                            .tile.pos-3-3 { transform: translate(calc(300% + 45px), calc(300% + 45px)); }
                        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <div class="container">
        <h1>2048</h1>
        <div class="subtitle">Собери плитку 2048</div>

        <!-- Шапка игры -->
        <div class="game-header">
            <div class="score-container">
                <div class="score-label">Счёт</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="best-container">
                <div class="score-label">Рекорд</div>
                <div class="score-value" id="best">0</div>
            </div>
            <button class="new-game-btn" onclick="newGame()">🔄 Новая игра</button>
        </div>

        <!-- Поле игры -->
        <div class="game-container">
            <!-- Сетка фона -->
            <div class="grid-container">
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
            
            <!-- Контейнер для плиток -->
            <div class="tile-container" id="tile-container"></div>
            
            <!-- Экран проигрыша -->
            <div class="game-over" id="game-over">
                <div>😵 Игра окончена!</div>
                <button onclick="newGame()">Новая игра</button>
            </div>
            
            <!-- Экран победы -->
            <div class="game-win" id="game-win">
                <div class="win-emoji">🏆</div>
                <div>ТЫ ПОБЕДИЛ!</div>
                <div style="font-size: 0.7em; margin: 10px;">2048 собрано!</div>
                <button onclick="continuePlaying()">Продолжить</button>
                <button onclick="newGame()">Новая игра</button>
            </div>
        </div>

        <!-- Управление -->
        <div class="controls-info">
            <div class="controls-title">🎮 Управление</div>
            <div class="keys-grid">
                <div class="key-group">
                    <div class="key-row"><div class="key wasd">W / Ц</div></div>
                    <div class="key-row">
                        <div class="key wasd">A / Ф</div>
                        <div class="key wasd">S / Ы</div>
                        <div class="key wasd">D / В</div>
                    </div>
                </div>
                <div class="key-group">
                    <div class="key-row"><div class="key">↑</div></div>
                    <div class="key-row">
                        <div class="key">←</div>
                        <div class="key">↓</div>
                        <div class="key">→</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
             const SIZE = 4;
                                    let board = [];
                                    let score = 0;
                                    let best = localStorage.getItem('2048_best') || 0;
                                    let gameWon = false;
                                    let isMoving = false; // Флаг для предотвращения многократного срабатывания
                                    let lastMoveTime = 0; // Время последнего хода
                                    let moveDelay = 150; // Минимальная задержка между ходами в миллисекундах (0.15 сек)
                                    let keysPressed = {}; // Объект для отслеживания нажатых клавиш
                      
                      // Загрузка звуковых файлов
                      let moveSound = null;
                      let mergeSound = null;
                      
                      function loadSound() {
                          try {
                              moveSound = new Audio('./move.mp3'); // Звук перемещения
                              
                              // Для звука объединения можно использовать тот же файл или другой
                              mergeSound = new Audio('./move.mp3'); // Звук объединения
                          } catch (e) {
                              console.log("Web Audio не поддерживается в этой среде");
                          }
                      }
                      
                      // Проигрывание звука при перемещении
                      function playMoveSound() {
                          if (moveSound) {
                              moveSound.currentTime = 0; // Перезапуск звука с начала
                              moveSound.play().catch(e => console.log("Ошибка воспроизведения звука:", e));
                          }
                      }
                      
                      // Проигрывание звука при объединении
                      function playMergeSound() {
                          if (mergeSound) {
                              mergeSound.currentTime = 0; // Перезапуск звука с начала
                              mergeSound.play().catch(e => console.log("Ошибка воспроизведения звука:", e));
                          }
                      }

        function init() {
            board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
            score = 0;
            gameWon = false;
            updateScore();
            addNewTile();
            addNewTile();
            render();
            document.getElementById('game-over').classList.remove('show');
            document.getElementById('game-win').classList.remove('show');
        }

        function addNewTile() {
            const empty = [];
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] === 0) empty.push({x: i, y: j});
                }
            }
            if (empty.length > 0) {
                const {x, y} = empty[Math.floor(Math.random() * empty.length)];
                board[x][y] = Math.random() < 0.9 ? 2 : 4;
            }
        }


        function moveLeft() {
                    let moved = false;
                    let mergedTiles = [];
                    
                    for (let i = 0; i < SIZE; i++) {
                        const row = board[i].filter(val => val !== 0);
                        for (let j = 0; j < row.length - 1; j++) {
                            if (row[j] === row[j + 1]) {
                                row[j] *= 2;
                                score += row[j];
                                row.splice(j + 1, 1);
                                moved = true;
                                mergedTiles.push({x: i, y: j});
                            }
                        }
                        while (row.length < SIZE) row.push(0);
                        for (let j = 0; j < SIZE; j++) {
                            if (board[i][j] !== row[j]) moved = true;
                            board[i][j] = row[j];
                        }
                    }
                    return {moved, mergedTiles};
                }

        function moveRight() {
                    let moved = false;
                    let mergedTiles = [];
                    
                    for (let i = 0; i < SIZE; i++) {
                        const row = board[i].filter(val => val !== 0).reverse();
                        for (let j = 0; j < row.length - 1; j++) {
                            if (row[j] === row[j + 1]) {
                                row[j] *= 2;
                                score += row[j];
                                row.splice(j + 1, 1);
                                moved = true;
                                mergedTiles.push({x: i, y: SIZE - 1 - j});
                            }
                        }
                        while (row.length < SIZE) row.push(0);
                        row.reverse();
                        for (let j = 0; j < SIZE; j++) {
                            if (board[i][j] !== row[j]) moved = true;
                            board[i][j] = row[j];
                        }
                    }
                    return {moved, mergedTiles};
                }

        function moveUp() {
                    let moved = false;
                    let mergedTiles = [];
                    
                    for (let j = 0; j < SIZE; j++) {
                        const col = [];
                        for (let i = 0; i < SIZE; i++) {
                            if (board[i][j] !== 0) col.push(board[i][j]);
                        }
                        for (let i = 0; i < col.length - 1; i++) {
                            if (col[i] === col[i + 1]) {
                                col[i] *= 2;
                                score += col[i];
                                col.splice(i + 1, 1);
                                moved = true;
                                mergedTiles.push({x: i, y: j});
                            }
                        }
                        while (col.length < SIZE) col.push(0);
                        for (let i = 0; i < SIZE; i++) {
                            if (board[i][j] !== col[i]) moved = true;
                            board[i][j] = col[i];
                        }
                    }
                    return {moved, mergedTiles};
                }

        function moveDown() {
                    let moved = false;
                    let mergedTiles = [];
                    
                    for (let j = 0; j < SIZE; j++) {
                        const col = [];
                        for (let i = 0; i < SIZE; i++) {
                            if (board[i][j] !== 0) col.push(board[i][j]);
                        }
                        col.reverse();
                        for (let i = 0; i < col.length - 1; i++) {
                            if (col[i] === col[i + 1]) {
                                col[i] *= 2;
                                score += col[i];
                                col.splice(i + 1, 1);
                                moved = true;
                                mergedTiles.push({x: SIZE - 1 - i, y: j});
                            }
                        }
                        while (col.length < SIZE) col.push(0);
                        col.reverse();
                        for (let i = 0; i < SIZE; i++) {
                            if (board[i][j] !== col[i]) moved = true;
                            board[i][j] = col[i];
                        }
                    }
                    return {moved, mergedTiles};
                }

        function checkWin() {
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] === 2048 && !gameWon) {
                        gameWon = true;
                        document.getElementById('game-win').classList.add('show');
                        setTimeout(() => {
                            const tiles = document.querySelectorAll('.tile-2048');
                            tiles.forEach(t => t.classList.add('win'));
                        }, 100);
                        return true;
                    }
                }
            }
            return false;
        }

        function isGameOver() {
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    if (board[i][j] === 0) return false;
                    if (i < SIZE - 1 && board[i][j] === board[i + 1][j]) return false;
                    if (j < SIZE - 1 && board[i][j] === board[i][j + 1]) return false;
                }
            }
            return true;
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > best) {
                best = score;
                localStorage.setItem('2048_best', best);
            }
            document.getElementById('best').textContent = best;
        }

        function continuePlaying() {
            document.getElementById('game-win').classList.remove('show');
        }

        function move(direction) {
                                               // Проверяем, не выполняется ли уже перемещение
                                               if (isMoving) return;
                                               
                                               // Проверяем, прошло ли достаточно времени с последнего хода
                                               const currentTime = Date.now();
                                               if (currentTime - lastMoveTime < moveDelay) {
                                                   return; // Слишком быстро, выходим
                                               }
                                               
                                               let result = {moved: false, mergedTiles: []};
                                               switch(direction) {
                                                   case 'left': result = moveLeft(); break;
                                                   case 'right': result = moveRight(); break;
                                                   case 'up': result = moveUp(); break;
                                                   case 'down': result = moveDown(); break;
                                               }
                                               
                                               if (result.moved) {
                                                   lastMoveTime = currentTime; // Обновляем время последнего хода
                                                   isMoving = true; // Устанавливаем флаг во время перемещения
                                                   
                                                   playMoveSound(); // Проигрываем звук при перемещении
                                                   
                                                   // Если были объединения, проигрываем звук объединения
                                                   if (result.mergedTiles.length > 0) {
                                                       playMergeSound();
                                                   }
                                                   
                                                   addNewTile();
                                                   renderWithMergeAnimation(result.mergedTiles);
                                                   updateScore();
                                                   checkWin();
                                                   if (isGameOver() && !gameWon) {
                                                       document.getElementById('game-over').classList.add('show');
                                                   }
                                                   
                                                   // Сбрасываем флаг сразу без ожидания анимации
                                                   isMoving = false;
                                               }
                                           }

        function newGame() {
            init();
        }

        // Обработчик нажатия клавиш
        document.addEventListener('keydown', function(event) {
            // Проверяем, не выполняется ли уже перемещение
            if (isMoving) {
                return;
            }
            
            const key = event.key;
            // Проверяем, была ли клавиша уже нажата
            if (keysPressed[key]) {
                return;
            }
            
            // Отмечаем клавишу как нажатую
            keysPressed[key] = true;
            
            if (key === 'ArrowLeft' || key === 'a' || key === 'A' || key === 'ф' || key === 'Ф') {
                event.preventDefault();
                move('left');
            }
            else if (key === 'ArrowRight' || key === 'd' || key === 'D' || key === 'в' || key === 'В') {
                event.preventDefault();
                move('right');
            }
            else if (key === 'ArrowUp' || key === 'w' || key === 'W' || key === 'ц' || key === 'Ц') {
                event.preventDefault();
                move('up');
            }
            else if (key === 'ArrowDown' || key === 's' || key === 'S' || key === 'ы' || key === 'Ы') {
                event.preventDefault();
                move('down');
            }
        });
        
        // Обработчик отпускания клавиш
        document.addEventListener('keyup', function(event) {
            const key = event.key;
            // Отмечаем клавишу как отпущенную
                         keysPressed[key] = false;
                     });
            
                     // Добавляем поддержку сенсорного управления для мобильных устройств
                     let touchStartX = 0;
                     let touchStartY = 0;
            
                     // Обработчик начала касания
                              document.addEventListener('touchstart', function(event) {
                                  if (event.touches.length === 1) {
                                      touchStartX = event.touches[0].clientX;
                                      touchStartY = event.touches[0].clientY;
                                      event.preventDefault(); // Предотвращаем прокрутку страницы
                                  }
                              }, { passive: false }); // passive: false позволяет использовать preventDefault
            
                     // Обработчик окончания касания
                              document.addEventListener('touchend', function(event) {
                                  if (event.changedTouches.length === 1) {
                                      const touchEndX = event.changedTouches[0].clientX;
                                      const touchEndY = event.changedTouches[0].clientY;
                                      
                                      const deltaX = touchEndX - touchStartX;
                                      const deltaY = touchEndY - touchStartY;
                                      
                                      // Определяем минимальное расстояние для срабатывания свайпа
                                      const minSwipeDistance = 30;
                                      
                                      // Проверяем, что движение было достаточным для свайпа
                                      if (Math.abs(deltaX) > minSwipeDistance || Math.abs(deltaY) > minSwipeDistance) {
                                          // Определяем направление свайпа
                                          if (Math.abs(deltaX) > Math.abs(deltaY)) {
                                              // Горизонтальный свайп
                                              if (deltaX > 0) {
                                                  // Свайп вправо
                                                  move('right');
                                              } else {
                                                  // Свайп влево
                                                  move('left');
                                              }
                                          } else {
                                              // Вертикальный свайп
                                              if (deltaY > 0) {
                                                  // Свайп вниз
                                                  move('down');
                                              } else {
                                                  // Свайп вверх
                                                  move('up');
                                              }
                                          }
                                      }
                                      
                                      event.preventDefault(); // Предотвращаем прокрутку страницы
                                  }
                              }, { passive: false }); // passive: false позволяет использовать preventDefault
            
                     init();
                     loadSound(); // Загружаем звук при инициализации
                     
                     // Основная функция рендеринга
                     function render() {
                         const container = document.getElementById('tile-container');
                         container.innerHTML = ''; // Очищаем контейнер перед рендерингом
                         
                         for (let i = 0; i < SIZE; i++) {
                             for (let j = 0; j < SIZE; j++) {
                                 if (board[i][j] !== 0) {
                                     const tile = document.createElement('div');
                                     tile.className = `tile tile-${board[i][j]} pos-${i}-${j}`;
                                     tile.textContent = board[i][j];
                                     container.appendChild(tile);
                                 }
                             }
                         }
                     }
                     
                     // Функция рендеринга с анимацией объединения
                     function renderWithMergeAnimation(mergedTiles) {
                         const container = document.getElementById('tile-container');
                         container.innerHTML = ''; // Очищаем контейнер перед рендерингом
                         
                         for (let i = 0; i < SIZE; i++) {
                             for (let j = 0; j < SIZE; j++) {
                                 if (board[i][j] !== 0) {
                                     const tile = document.createElement('div');
                                     tile.className = `tile tile-${board[i][j]} pos-${i}-${j}`;
                                     
                                     // Проверяем, была ли эта плитка объединена
                                     const isMerged = mergedTiles.some(pos => pos.x === i && pos.y === j);
                                     if (isMerged) {
                                         tile.classList.add('merged');
                                     }
                                     
                                     tile.textContent = board[i][j];
                                     container.appendChild(tile);
                                 }
                             }
                         }
                         
                         // Удаляем класс merged немедленно
                         const mergedElements = document.querySelectorAll('.tile.merged');
                         mergedElements.forEach(el => el.classList.remove('merged'));
                     }
                     
                     </script>
                                      </body>
                                      </html>
