<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест микрофона - В ПК!</title>
    
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
        }

        /* Модальное окно */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .modal-text {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .modal-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        /* Карточка */
        .card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .card-header span {
            font-size: 1.5em;
        }

        .card-header h2 {
            font-size: 1.3em;
            color: #333;
        }

        /* Статус */
        .status {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .status-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #95a5a6;
        }

        .status-led.active {
            background: #27ae60;
            box-shadow: 0 0 10px #27ae60;
        }

        .status-led.error {
            background: #e74c3c;
            box-shadow: 0 0 10px #e74c3c;
        }

        /* Индикатор громкости */
        .volume-meter {
            height: 30px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }

        .volume-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3498db, #9b59b6);
            transition: width 0.1s;
        }

        /* Кнопки */
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 15px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary { background: linear-gradient(135deg, #3498db, #2980b9); }
        .btn-success { background: linear-gradient(135deg, #27ae60, #229954); }
        .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .btn-warning { background: linear-gradient(135deg, #f39c12, #e67e22); }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Метрики */
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .metric {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .metric-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        /* Плеер */
        .player {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        audio {
            width: 100%;
            margin: 10px 0;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            background: #95a5a6;
            color: white;
            font-size: 0.9em;
            margin-left: 10px;
        }

        .badge.active {
            background: #27ae60;
        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <!-- Модальное окно -->
    <div class="modal" id="permissionModal">
        <div class="modal-content">
            <div class="modal-icon">🎤</div>
            <div class="modal-title">Доступ к микрофону</div>
            <div class="modal-text">
                Разрешите доступ к микрофону для тестирования.<br>
                Это безопасно, данные никуда не отправляются.
            </div>
            <button class="modal-btn" onclick="requestMicrophone()">
                ✅ Разрешить
            </button>
        </div>
    </div>

    <div class="container">
        <h1>🎤 Тест микрофона</h1>
        <div class="subtitle">Проверка и визуализация звука</div>

        <!-- Основная карточка -->
        <div class="card">
            <div class="card-header">
                <span>🎙️</span>
                <h2>Микрофон</h2>
            </div>

            <div class="status" id="status">
                <div class="status-led" id="statusLed"></div>
                <span id="statusText">Ожидание разрешения...</span>
            </div>

            <select class="device-selector" id="micSelect" disabled style="width:100%; padding:12px; margin-bottom:20px; border-radius:15px; border:2px solid #f0f0f0;">
                <option>Сначала разрешите доступ</option>
            </select>

            <!-- Индикатор громкости -->
            <div class="volume-meter">
                <div class="volume-fill" id="volumeFill"></div>
            </div>

            <!-- Метрики -->
            <div class="metrics">
                <div class="metric">
                    <div class="metric-label">Громкость</div>
                    <div class="metric-value" id="volumeValue">0%</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Пик</div>
                    <div class="metric-value" id="peakValue">0%</div>
                </div>
            </div>

            <!-- Кнопки -->
            <div class="button-group">
                <button class="btn btn-primary" id="startBtn" onclick="startTest()" disabled>
                    ▶️ Старт
                </button>
                <button class="btn btn-danger" id="stopBtn" onclick="stopTest()" disabled>
                    ⏹️ Стоп
                </button>
                <button class="btn btn-success" id="recordBtn" onclick="startRecording()" disabled>
                    ⏺️ Запись
                </button>
                <button class="btn btn-warning" id="echoBtn" onclick="toggleEcho()" disabled>
                    🔊 Эхо <span class="badge" id="echoBadge">Выкл</span>
                </button>
            </div>

            <!-- Плеер -->
            <div class="player" id="player" style="display: none;">
                <h4 style="margin-bottom:10px;">Ваша запись:</h4>
                <audio id="playback" controls></audio>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn btn-success" onclick="downloadRecording()">⬇️ Скачать</button>
                    <button class="btn btn-danger" onclick="clearRecording()">🗑️ Очистить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        // Переменные
        let audioContext = null;
        let analyser = null;
        let mediaStream = null;
        let source = null;
        let animationId = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isActive = false;
        let echoEnabled = false;
        let peakValue = 0;

        // Модальное окно
        const modal = document.getElementById('permissionModal');

        // Запрос разрешения
        async function requestMicrophone() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Прячем модалку
                modal.classList.add('hidden');
                
                // Обновляем статус
                document.getElementById('statusLed').className = 'status-led active';
                document.getElementById('statusText').textContent = 'Микрофон готов';
                
                // Активируем элементы
                document.getElementById('startBtn').disabled = false;
                document.getElementById('recordBtn').disabled = false;
                document.getElementById('echoBtn').disabled = false;
                
                // Получаем устройства
                await getDevices();
                
            } catch (error) {
                alert('Ошибка доступа к микрофону: ' + error.message);
            }
        }

        // Получение устройств
        async function getDevices() {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const mics = devices.filter(d => d.kind === 'audioinput');
            
            const select = document.getElementById('micSelect');
            select.disabled = false;
            select.innerHTML = mics.map((mic, i) => 
                `<option value="${mic.deviceId}">${mic.label || `Микрофон ${i+1}`}</option>`
            ).join('');
        }

        // Смена микрофона
        document.getElementById('micSelect').addEventListener('change', async function() {
            if (isActive) stopTest();
            
            mediaStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { deviceId: this.value ? { exact: this.value } : undefined }
            });
        });

        // Старт теста
        function startTest() {
            if (!mediaStream) return;
            
            audioContext = new AudioContext();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            
            source = audioContext.createMediaStreamSource(mediaStream);
            source.connect(analyser);
            
            isActive = true;
            peakValue = 0;
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            
            updateVolume();
        }

        // Остановка теста
        function stopTest() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            if (source) source.disconnect();
            if (audioContext) audioContext.close();
            
            isActive = false;
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('volumeFill').style.width = '0%';
            document.getElementById('volumeValue').textContent = '0%';
        }

        // Обновление громкости
        function updateVolume() {
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            function update() {
                animationId = requestAnimationFrame(update);
                
                analyser.getByteFrequencyData(dataArray);
                
                // Средняя громкость
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    sum += dataArray[i];
                }
                const avg = sum / dataArray.length / 255 * 100;
                
                // Пик
                const peak = Math.max(...dataArray) / 255 * 100;
                peakValue = Math.max(peakValue, peak);
                
                // Обновляем интерфейс
                document.getElementById('volumeFill').style.width = avg + '%';
                document.getElementById('volumeValue').textContent = Math.round(avg) + '%';
                document.getElementById('peakValue').textContent = Math.round(peakValue) + '%';
                
                // Эхо
                if (echoEnabled && avg > 15) {
                    playEcho();
                }
            }
            
            update();
        }

        // Эхо
        function toggleEcho() {
            echoEnabled = !echoEnabled;
            const badge = document.getElementById('echoBadge');
            
            if (echoEnabled) {
                badge.textContent = 'Вкл';
                badge.className = 'badge active';
            } else {
                badge.textContent = 'Выкл';
                badge.className = 'badge';
            }
        }

        function playEcho() {
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            gain.gain.value = 0.2;
            osc.frequency.value = 440;
            
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        }

        // Запись
        function startRecording() {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(mediaStream);
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                document.getElementById('playback').src = URL.createObjectURL(blob);
                document.getElementById('player').style.display = 'block';
                window.lastRecording = blob;
            };
            
            mediaRecorder.start();
            
            document.getElementById('recordBtn').disabled = true;
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            document.getElementById('recordBtn').disabled = false;
        }

        // Скачивание
        function downloadRecording() {
            if (!window.lastRecording) return;
            const url = URL.createObjectURL(window.lastRecording);
            const a = document.createElement('a');
            a.href = url;
            a.download = `mic-${Date.now()}.webm`;
            a.click();
        }

        function clearRecording() {
            document.getElementById('player').style.display = 'none';
            document.getElementById('playback').src = '';
            window.lastRecording = null;
        }

        // При загрузке показываем модалку
        document.addEventListener('DOMContentLoaded', () => {
            modal.classList.remove('hidden');
        });
    </script>
</body>
</html>
