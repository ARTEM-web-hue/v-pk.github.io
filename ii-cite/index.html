<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИИ Генератор сайтов - В ПК!</title>
    
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #1e3c72;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 40px;
        }

        .generator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .input-panel {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
        }

        .input-panel h2 {
            color: #1e3c72;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2c3e50;
        }

        .form-group input, 
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .generate-btn {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 60, 114, 0.3);
        }

        .generate-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .result-panel {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
        }

        .result-panel h2 {
            color: #1e3c72;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .preview-frame {
            width: 100%;
            height: 400px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            margin-bottom: 15px;
        }

        .code-output {
            background: #2c3e50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e3c72;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .success-message {
            background: #2ecc71;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .history-section {
            margin-top: 40px;
            border-top: 2px solid #e0e0e0;
            padding-top: 30px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #f8f9fa;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
        }

        .history-item:hover {
            background: #e0e0e0;
        }

        @media (max-width: 800px) {
            .generator-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <div class="container">
        <h1>🤖 Генератор сайтов с ИИ</h1>
        <div class="subtitle">На базе YandexGPT — российский, быстрый, бесплатный</div>

        <div class="generator-grid">
            <div class="input-panel">
                <h2>📝 Параметры сайта</h2>
                
                <div class="form-group">
                    <label>Что за сайт?</label>
                    <input type="text" id="site-topic" placeholder="Например: кофейня, портфолио" value="кофейня">
                </div>

                <div class="form-group">
                    <label>Детали</label>
                    <textarea id="site-details" placeholder="Опиши подробно...">Красивый сайт для кофейни с меню, фотографиями и контактами</textarea>
                </div>

                <div class="form-group">
                    <label>Стиль</label>
                    <select id="site-style">
                        <option value="modern">Современный</option>
                        <option value="minimal">Минимализм</option>
                        <option value="cyber">Киберпанк</option>
                        <option value="classic">Классический</option>
                    </select>
                </div>

                <button class="generate-btn" id="generate-btn" onclick="generateSite()">
                    🚀 СГЕНЕРИРОВАТЬ
                </button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px;">YandexGPT думает... Это займёт несколько секунд</p>
                </div>
            </div>

            <div class="result-panel">
                <h2>🎨 Результат</h2>
                
                <iframe id="preview" class="preview-frame" srcdoc="<html><body style='display:flex;justify-content:center;align-items:center;height:100%;font-family:Arial;color:#666;'>Здесь будет сгенерированный сайт</body></html>"></iframe>
                
                <div class="code-output" id="code-output">
                    Нажми "Сгенерировать" чтобы создать сайт
                </div>

                <div id="message-container"></div>
            </div>
        </div>

        <div class="history-section">
            <h2>📜 История генераций</h2>
            <ul class="history-list" id="history-list">
                <li class="history-item">Пока нет сохранённых сайтов</li>
            </ul>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        // ТВОИ ДАННЫЕ ЯНДЕКСА
        const FOLDER_ID = 'b1gqd5f3qariceg4oqht';
        const API_KEY = 'YCAJEOU3_ItuNmjc6jCtle_Uz';  // или второй ключ, любой рабочий
        
        let history = JSON.parse(localStorage.getItem('ai_history')) || [];
        renderHistory();

        async function generateSite() {
            const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
            const targetUrl = 'https://llm.api.cloud.yandex.net/foundationModels/v1/completion';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('generate-btn').disabled = true;
            document.getElementById('message-container').innerHTML = '';

            try {
                const topic = document.getElementById('site-topic').value;
                const details = document.getElementById('site-details').value;
                const style = document.getElementById('site-style').value;

                const prompt = `Создай ПОЛНЫЙ HTML код для сайта на тему: "${topic}".
                
Детали: ${details}
Стиль: ${style}

Требования:
- Красивый современный дизайн
- Адаптивная вёрстка
- CSS стили внутри тега <style>
- Минимум JavaScript (только для красоты)
- Всё должно быть в одном файле

Верни ТОЛЬКО HTML код, без объяснений, без markdown.`;

                const response = await fetch(proxyUrl + targetUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Api-Key ${API_KEY}`,
                        'x-folder-id': FOLDER_ID
                    },
                    body: JSON.stringify({
                        modelUri: `gpt://${FOLDER_ID}/yandexgpt-lite`,
                        completionOptions: { 
                            stream: false, 
                            temperature: 0.6,
                            maxTokens: 2000
                        },
                        messages: [
                            {
                                role: 'user',
                                text: prompt
                            }
                        ]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message || 'Ошибка API');
                }

                let htmlCode = data.result.alternatives[0].message.text;
                htmlCode = htmlCode.replace(/```html/g, '').replace(/```/g, '').trim();

                document.getElementById('preview').srcdoc = htmlCode;
                document.getElementById('code-output').textContent = htmlCode;
                
                showMessage('✅ Сайт успешно сгенерирован!', 'success');
                saveToHistory(topic, htmlCode);

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('❌ Ошибка: ' + error.message, 'error');
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('generate-btn').disabled = false;
            }
        }

        function showMessage(text, type) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="${type === 'error' ? 'error-message' : 'success-message'}">${text}</div>`;
        }

        function saveToHistory(topic, code) {
            const item = {
                topic: topic,
                code: code,
                date: new Date().toLocaleString()
            };
            
            history.unshift(item);
            if (history.length > 10) history.pop();
            
            localStorage.setItem('ai_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            
            if (history.length === 0) {
                list.innerHTML = '<li class="history-item">Пока нет сохранённых сайтов</li>';
                return;
            }
            
            list.innerHTML = history.map((item, index) => `
                <li class="history-item" onclick="loadFromHistory(${index})">
                    <span>${item.topic}</span>
                    <span style="color:#7f8c8d;">${item.date}</span>
                </li>
            `).join('');
        }

        function loadFromHistory(index) {
            const item = history[index];
            document.getElementById('site-topic').value = item.topic;
            document.getElementById('preview').srcdoc = item.code;
            document.getElementById('code-output').textContent = item.code;
            showMessage('✅ Загружено из истории', 'success');
        }
    </script>
</body>
</html>
