<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест реакции - В ПК!</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            min-height: 100vh;
        }

        .reaction-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #e67e22;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        /* Игровая зона */
        .game-area {
            text-align: center;
            margin: 30px 0;
        }

        .reaction-button {
            width: 350px;
            height: 350px;
            margin: 0 auto;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: all 0.1s;
            color: white;
            border: 4px solid rgba(255,255,255,0.3);
            user-select: none;
            font-weight: bold;
        }

        /* Курсор: песочные часы для всех состояний */
        .reaction-button.waiting,
        .reaction-button.ready,
        .reaction-button.active,
        .reaction-button.success {
            cursor: wait !important;
        }

        .reaction-button.waiting {
            background: #f1c40f;
            box-shadow: 0 20px 40px rgba(241, 196, 15, 0.4);
        }

        .reaction-button.ready {
            background: #f1c40f;
            box-shadow: 0 20px 40px rgba(241, 196, 15, 0.4);
        }

        .reaction-button.active {
            background: #e74c3c;
            box-shadow: 0 20px 40px rgba(231, 76, 60, 0.5);
            animation: pulse-red 0.5s infinite;
        }

        .reaction-button.false-start {
            background: #95a5a6;
            box-shadow: 0 20px 40px rgba(149, 165, 166, 0.5);
            animation: shake 0.3s;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .reaction-button.success {
            background: #27ae60;
            box-shadow: 0 20px 40px rgba(39, 174, 96, 0.4);
        }

        .main-text {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .sub-text {
            font-size: 20px;
            opacity: 0.95;
            max-width: 250px;
            text-align: center;
            line-height: 1.4;
        }

        /* Метрики */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 40px 0;
        }

        .metric-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .metric-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .metric-label {
            color: #7f8c8d;
            font-size: 0.8em;
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #2c3e50;
            margin: 5px 0;
        }

        .metric-unit {
            color: #95a5a6;
            font-size: 0.8em;
        }

        /* Результаты теста */
        .results-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            display: none;
        }

        .result-main {
            text-align: center;
            margin-bottom: 30px;
        }

        .result-time {
            font-size: 4em;
            font-weight: bold;
            color: #e67e22;
            line-height: 1;
            margin-bottom: 15px;
        }

        .result-message {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-description {
            font-size: 1.2em;
            color: #7f8c8d;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 15px;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #2c3e50;
        }

        /* Кнопки */
        .control-panel {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(243, 156, 18, 0.3);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        /* История */
        .history-section {
            margin-top: 40px;
            border-top: 2px solid #e0e0e0;
            padding-top: 30px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #f8f9fa;
            margin-bottom: 8px;
            border-radius: 10px;
        }

        .history-item .time {
            color: #7f8c8d;
        }

        .history-item .reaction {
            font-weight: bold;
            color: #e67e22;
        }

        .history-item .best {
            color: #f1c40f;
        }

        .history-item .false-start-item {
            color: #e74c3c;
            font-style: italic;
        }

        @media (max-width: 700px) {
            .reaction-button {
                width: 280px;
                height: 280px;
            }
            
            .main-text {
                font-size: 36px;
            }
            
            .sub-text {
                font-size: 16px;
            }
            
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .result-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <div class="reaction-container">
        <h1>⚡ Тест реакции</h1>
        <div class="subtitle">Жди красного цвета и быстро кликай! (Ложный старт = фол)</div>

        <!-- Основное игровое поле -->
        <div class="game-area">
            <div class="reaction-button waiting" id="reaction-button">
                <div class="main-text" id="main-text">👆</div>
                <div class="sub-text" id="sub-text">Нажми, чтобы начать</div>
            </div>
        </div>

        <!-- Метрики -->
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-icon">⚡</div>
                <div class="metric-label">ЛУЧШАЯ</div>
                <div class="metric-value" id="best-time">—</div>
                <div class="metric-unit">мс</div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">📊</div>
                <div class="metric-label">СРЕДНЯЯ</div>
                <div class="metric-value" id="avg-time">—</div>
                <div class="metric-unit">мс</div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">🎯</div>
                <div class="metric-label">УСПЕШНО</div>
                <div class="metric-value" id="successful">0</div>
                <div class="metric-unit">раз</div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">⚠️</div>
                <div class="metric-label">ФОЛОВ</div>
                <div class="metric-value" id="false-starts">0</div>
                <div class="metric-unit">раз</div>
            </div>
        </div>

        <!-- Результаты теста (появляются после каждого клика) -->
        <div class="results-section" id="results-section">
            <div class="result-main">
                <div class="result-time" id="result-time">0</div>
                <div class="result-message" id="result-message">—</div>
                <div class="result-description" id="result-description">—</div>
            </div>
            
            <div class="result-stats">
                <div class="stat-item">
                    <div class="stat-label">Лучшая</div>
                    <div class="stat-value" id="result-best">—</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Средняя</div>
                    <div class="stat-value" id="result-avg">—</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Успешно</div>
                    <div class="stat-value" id="result-successful">0</div>
                </div>
            </div>
        </div>

        <!-- Кнопки управления -->
        <div class="control-panel">
            <button class="btn btn-secondary" id="reset-test">🔄 Сбросить статистику</button>
        </div>

        <!-- История последних результатов -->
        <div class="history-section">
            <h3>📜 Последние результаты</h3>
            <ul class="history-list" id="history-list">
                <li class="history-item">Ещё нет данных</li>
            </ul>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        class ReactionTest {
            constructor() {
                this.testActive = false;
                this.waitingForRed = false;
                this.startTime = null;
                this.reactionTimes = [];
                this.falseStarts = 0;
                this.successfulAttempts = 0;
                
                // Загрузка истории
                this.history = JSON.parse(localStorage.getItem('reaction_history')) || [];
                
                this.initElements();
                this.addEventListeners();
                this.renderHistory();
                this.updateStats();
            }

            initElements() {
                this.button = document.getElementById('reaction-button');
                this.mainText = document.getElementById('main-text');
                this.subText = document.getElementById('sub-text');
                
                this.bestTimeEl = document.getElementById('best-time');
                this.avgTimeEl = document.getElementById('avg-time');
                this.successfulEl = document.getElementById('successful');
                this.falseStartsEl = document.getElementById('false-starts');
                
                this.resultsSection = document.getElementById('results-section');
                this.resultTime = document.getElementById('result-time');
                this.resultMessage = document.getElementById('result-message');
                this.resultDescription = document.getElementById('result-description');
                this.resultBest = document.getElementById('result-best');
                this.resultAvg = document.getElementById('result-avg');
                this.resultSuccessful = document.getElementById('result-successful');
                
                this.resetBtn = document.getElementById('reset-test');
                this.historyList = document.getElementById('history-list');
            }

            addEventListeners() {
                this.button.addEventListener('click', () => this.handleClick());
                this.resetBtn.addEventListener('click', () => this.resetStats());
            }

            handleClick() {
                // Если тест не активен - запускаем
                if (!this.testActive && !this.waitingForRed) {
                    this.startTest();
                    return;
                }

                // Если ждем красный - проверяем, не фол ли это
                if (this.testActive && !this.waitingForRed) {
                    // ФОЛ! Кликнули до появления красного
                    this.handleFalseStart();
                    return;
                }

                // Если ждем красный И он уже появился - фиксируем реакцию
                if (this.waitingForRed) {
                    const reactionTime = Date.now() - this.startTime;
                    this.finishTest(reactionTime);
                }
            }

            startTest() {
                this.testActive = true;
                this.waitingForRed = false;
                
                this.button.classList.remove('waiting', 'active', 'success', 'false-start');
                this.button.classList.add('ready');
                this.mainText.textContent = '⏳';
                this.subText.textContent = 'Жди красного...';
                
                // Случайный интервал от 1.5 до 7.5 секунд
                const delay = 1500 + Math.random() * 6000; // 1500-7500 мс
                
                // Сохраняем таймаут, чтобы можно было его отменить при фоле
                this.redTimeout = setTimeout(() => {
                    if (this.testActive) {
                        this.turnRed();
                    }
                }, delay);
            }

            turnRed() {
                this.waitingForRed = true;
                this.startTime = Date.now();
                
                this.button.classList.remove('ready');
                this.button.classList.add('active');
                this.mainText.textContent = '🔴';
                this.subText.textContent = 'КЛИКАЙ!';
            }

            handleFalseStart() {
                // Отменяем таймаут появления красного
                clearTimeout(this.redTimeout);
                
                this.testActive = false;
                this.waitingForRed = false;
                this.falseStarts++;
                
                // Показываем фол
                this.button.classList.remove('ready', 'active', 'success');
                this.button.classList.add('false-start');
                this.mainText.textContent = '❌';
                this.subText.textContent = 'ФОЛ! Рано нажал';
                
                // Сохраняем в историю
                this.history.unshift({
                    type: 'false',
                    time: 'Фол',
                    date: new Date().toLocaleDateString(),
                    timeStr: new Date().toLocaleTimeString()
                });
                
                if (this.history.length > 20) {
                    this.history.pop();
                }
                localStorage.setItem('reaction_history', JSON.stringify(this.history));
                
                this.updateStats();
                this.renderHistory();
                
                // Скрываем секцию результатов
                this.resultsSection.style.display = 'none';
                
                // Через 1 секунду возвращаем в исходное состояние
                setTimeout(() => {
                    this.button.classList.remove('false-start');
                    this.button.classList.add('waiting');
                    this.mainText.textContent = '👆';
                    this.subText.textContent = 'Нажми, чтобы начать';
                }, 1000);
            }

            finishTest(reactionTime) {
                this.waitingForRed = false;
                this.testActive = false;
                
                // Сохраняем результат
                this.reactionTimes.push(reactionTime);
                this.successfulAttempts++;
                
                this.history.unshift({
                    type: 'success',
                    time: reactionTime,
                    date: new Date().toLocaleDateString(),
                    timeStr: new Date().toLocaleTimeString()
                });
                
                // Ограничиваем историю
                if (this.history.length > 20) {
                    this.history.pop();
                }
                localStorage.setItem('reaction_history', JSON.stringify(this.history));
                
                // Показываем результат
                this.showResult(reactionTime);
                this.updateStats();
                this.renderHistory();
                
                // Меняем кнопку
                this.button.classList.remove('active', 'false-start');
                this.button.classList.add('success');
                this.mainText.textContent = '✅';
                this.subText.textContent = 'Ещё раз? Нажми';
            }

            showResult(time) {
                this.resultsSection.style.display = 'block';
                this.resultTime.textContent = time + ' мс';
                
                // Определяем сообщение в зависимости от времени (обновлённые пороги)
                let message, description;
                
                if (time <= 10) {
                    message = '🚀 СУПЕРКОМПЬЮТЕР';
                    description = 'Ты быстрее, чем 99.9% людей!';
                } else if (time <= 50) {
                    message = '✈️ РЕАКЦИЯ ПИЛОТА';
                    description = 'Да тебе бы на истребителе полетать!';
                } else if (time <= 100) {
                    message = '🎯 ОТЛИЧНО!';
                    description = 'Ты в топе лучших!';
                } else if (time <= 200) {
                    message = '👍 ВЫШЕ СРЕДНЕГО';
                    description = 'Хороший результат!';
                } else if (time <= 300) {
                    message = '👌 НОРМАЛЬНО';
                    description = 'Средний результат';
                } else if (time <= 350) {
                    message = '🤔 ТАК СЕБЕ';
                    description = 'Можно и побыстрее';
                } else if (time <= 500) {
                    message = '🐢 ТОРМОЗОВАТО';
                    description = 'Сорян, но чёт задумался?';
                } else if (time <= 1000) {
                    message = '😴 ПЛОХЕНЬКО';
                    description = 'Может, чайку?';
                } else {
                    message = '💤 ТЫ УСНУЛ?';
                    description = 'Больше секунды - это уже сон';
                }
                
                this.resultMessage.textContent = message;
                this.resultDescription.textContent = description;
            }

            updateStats() {
                if (this.reactionTimes.length === 0) {
                    this.bestTimeEl.textContent = '—';
                    this.avgTimeEl.textContent = '—';
                } else {
                    const best = Math.min(...this.reactionTimes);
                    const avg = Math.round(this.reactionTimes.reduce((a, b) => a + b, 0) / this.reactionTimes.length);
                    
                    this.bestTimeEl.textContent = best;
                    this.avgTimeEl.textContent = avg;
                    
                    this.resultBest.textContent = best + ' мс';
                    this.resultAvg.textContent = avg + ' мс';
                }
                
                this.successfulEl.textContent = this.successfulAttempts;
                this.falseStartsEl.textContent = this.falseStarts;
                
                this.resultSuccessful.textContent = this.successfulAttempts;
            }

            resetStats() {
                if (confirm('Сбросить всю статистику реакции?')) {
                    this.reactionTimes = [];
                    this.falseStarts = 0;
                    this.successfulAttempts = 0;
                    this.history = [];
                    localStorage.removeItem('reaction_history');
                    this.updateStats();
                    this.renderHistory();
                    this.resultsSection.style.display = 'none';
                    
                    this.button.classList.remove('success', 'active', 'false-start');
                    this.button.classList.add('waiting');
                    this.mainText.textContent = '👆';
                    this.subText.textContent = 'Нажми, чтобы начать';
                }
            }

            renderHistory() {
                if (this.history.length === 0) {
                    this.historyList.innerHTML = '<li class="history-item">Ещё нет данных</li>';
                    return;
                }
                
                // Находим лучший успешный результат
                const successfulTimes = this.history.filter(h => h.type === 'success').map(h => h.time);
                const bestTime = successfulTimes.length > 0 ? Math.min(...successfulTimes) : null;
                
                this.historyList.innerHTML = this.history.slice(0, 10).map(item => {
                    if (item.type === 'false') {
                        return `
                            <li class="history-item">
                                <span class="time">${item.date} ${item.timeStr}</span>
                                <span class="false-start-item">❌ ФОЛ</span>
                            </li>
                        `;
                    } else {
                        return `
                            <li class="history-item">
                                <span class="time">${item.date} ${item.timeStr}</span>
                                <span class="reaction ${item.time === bestTime ? 'best' : ''}">
                                    ${item.time} мс
                                </span>
                            </li>
                        `;
                    }
                }).join('');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new ReactionTest();
        });
    </script>
</body>
</html>
