    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИИ Генератор сайтов - Свободное творчество</title>
    
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <!-- Transformers.js - правильное подключение -->
    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';
        window.Transformers = { pipeline, env };
        console.log('Transformers loaded');
    </script>
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #8e44ad;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 40px;
        }

        .model-info {
            background: #f0f4f8;
            border-left: 4px solid #27ae60;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .generator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .input-panel {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
        }

        .input-panel h2 {
            color: #8e44ad;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2c3e50;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .randomize-btn {
            background: #8e44ad;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            margin-left: 10px;
        }

        .generate-btn {
            background: linear-gradient(135deg, #8e44ad, #9b59b6);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(142,68,173,0.3);
        }

        .generate-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .result-panel {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
        }

        .result-panel h2 {
            color: #8e44ad;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .preview-frame {
            width: 100%;
            height: 400px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            margin-bottom: 15px;
        }

        .code-output {
            background: #2c3e50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #8e44ad;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8e44ad, #9b59b6);
            width: 0%;
            transition: width 0.3s;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .success-message {
            background: #2ecc71;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .history-section {
            margin-top: 40px;
            border-top: 2px solid #e0e0e0;
            padding-top: 30px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #f8f9fa;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
        }

        .history-item:hover {
            background: #e0e0e0;
        }

        .size-badge {
            background: #8e44ad;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-left: 10px;
        }

        @media (max-width: 800px) {
            .generator-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <div class="container">
        <h1>🤖 ИИ Генератор сайтов</h1>
        <div class="subtitle">Свобода творчества без границ</div>

        <div class="model-info" id="model-info">
            <span id="model-status-text">⚡ Режим творчества</span>
            <span class="model-status" id="model-status">✨</span>
        </div>

        <div class="generator-grid">
            <div class="input-panel">
                <h2>📝 Опиши идею</h2>
                
                <div class="form-group">
                    <label>
                        Тема
                        <button class="randomize-btn" onclick="randomizeIdea()">✨ Случайная</button>
                    </label>
                    <input type="text" id="site-topic" placeholder="Например: космические коты" value="космические коты">
                </div>

                <div class="form-group">
                    <label>Детали</label>
                    <textarea id="site-details" placeholder="Опиши что хочешь...">Сайт про котов в космосе, с анимациями и интерактивом</textarea>
                </div>

                <button class="generate-btn" onclick="generateSite()">
                    🎨 СОТВОРИТЬ
                </button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Творю...</p>
                </div>
            </div>

            <div class="result-panel">
                <h2>🎨 Результат</h2>
                
                <iframe id="preview" class="preview-frame"></iframe>
                
                <div class="code-output" id="code-output">
                    Нажми "СОТВОРИТЬ"
                </div>

                <div id="message-container"></div>
            </div>
        </div>

        <div class="history-section">
            <h2>📜 История</h2>
            <ul class="history-list" id="history-list">
                <li class="history-item">Пока нет сохранений</li>
            </ul>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        // Простые примеры
        const ideas = [
            "космические коты",
            "киберпанк кафе",
            "портал в сны",
            "магазин эмоций",
            "квантовый калькулятор",
            "галерея воспоминаний"
        ];

        let history = JSON.parse(localStorage.getItem('ai_history')) || [];

        function randomizeIdea() {
            const randomIdea = ideas[Math.floor(Math.random() * ideas.length)];
            document.getElementById('site-topic').value = randomIdea;
        }

        function generateSite() {
            document.getElementById('loading').style.display = 'block';
            
            setTimeout(() => {
                const topic = document.getElementById('site-topic').value;
                const details = document.getElementById('site-details').value;
                
                const htmlCode = generateCreativeSite(topic, details);
                
                document.getElementById('preview').srcdoc = htmlCode;
                document.getElementById('code-output').textContent = htmlCode;
                document.getElementById('loading').style.display = 'none';
                
                showMessage('✅ Готово!', 'success');
                saveToHistory(topic, htmlCode);
            }, 1500);
        }

        function generateCreativeSite(topic, details) {
            return `<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ ${topic} ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            animation: glow 3s infinite;
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px rgba(255,255,255,0.5); }
            50% { text-shadow: 0 0 30px rgba(255,255,255,0.8); }
        }
        
        .content {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            margin: 30px 0;
        }
        
        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin: 20px 0;
        }
        
        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ ${topic} ✨</h1>
        <div class="content">
            <p>${details}</p>
            <button class="btn" onclick="alert('Привет!')">Нажми меня</button>
        </div>
    </div>
</body>
</html>`;
        }

        function showMessage(text, type) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="${type === 'error' ? 'error-message' : 'success-message'}">${text}</div>`;
            setTimeout(() => container.innerHTML = '', 3000);
        }

        function saveToHistory(topic, code) {
            const lines = code.split('\n').length;
            const item = {
                topic: topic,
                code: code,
                date: new Date().toLocaleString(),
                lines: lines
            };
            
            history.unshift(item);
            if (history.length > 10) history.pop();
            
            localStorage.setItem('ai_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            
            if (history.length === 0) {
                list.innerHTML = '<li class="history-item">Пока нет сохранений</li>';
                return;
            }
            
            list.innerHTML = history.map((item, index) => `
                <li class="history-item" onclick="loadFromHistory(${index})">
                    <span>${item.topic}</span>
                    <span>
                        <span class="size-badge">${item.lines} строк</span>
                        ${item.date}
                    </span>
                </li>
            `).join('');
        }

        function loadFromHistory(index) {
            const item = history[index];
            document.getElementById('site-topic').value = item.topic;
            document.getElementById('preview').srcdoc = item.code;
            document.getElementById('code-output').textContent = item.code;
        }

        renderHistory();
    </script>
</body>
</html>
