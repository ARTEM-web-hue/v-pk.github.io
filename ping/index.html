<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интернетометр - В ПК!</title>
    
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }

        .speedtest-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #1e3c72;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .file-info {
            background: #f0f4f8;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }

        .file-info-item {
            text-align: center;
        }

        .file-info-label {
            color: #666;
            font-size: 0.8em;
            text-transform: uppercase;
        }

        .file-info-value {
            font-weight: bold;
            color: #1e3c72;
            font-size: 1.2em;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .metric-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .metric-label {
            color: #666;
            font-size: 0.8em;
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #1e3c72;
            margin: 5px 0;
        }

        .metric-unit {
            color: #999;
            font-size: 0.8em;
        }

        .ping-card {
            grid-column: span 3;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .ping-card .metric-label,
        .ping-card .metric-value,
        .ping-card .metric-unit {
            color: white;
        }

        .control-panel {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 60, 114, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .progress-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .current-status {
            font-size: 1.2em;
            color: #1e3c72;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .progress-bar {
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            width: 0%;
            transition: width 0.3s;
            border-radius: 10px;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 0.9em;
        }

        .real-time-speed {
            font-size: 1.5em;
            font-weight: bold;
            color: #1e3c72;
            text-align: center;
            margin: 15px 0;
        }

        .history-section {
            margin-top: 40px;
            border-top: 2px solid #e0e0e0;
            padding-top: 30px;
        }

        .history-title {
            color: #1e3c72;
            margin-bottom: 20px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #f8f9fa;
            margin-bottom: 8px;
            border-radius: 10px;
            color: #333;
            font-size: 0.95em;
        }

        .history-item .time {
            color: #666;
        }

        .history-item .results {
            font-weight: bold;
            color: #1e3c72;
        }

        @media (max-width: 700px) {
            .metrics-grid {
                grid-template-columns: 1fr;
            }
            
            .ping-card {
                grid-column: span 1;
            }
            
            .speedtest-container {
                margin: 20px;
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }

            .file-info {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <div class="speedtest-container">
        <h1>📡 Интернетометр В ПК!</h1>
        <div class="subtitle">Честный тест на твоём файле</div>

        <!-- Информация о тестовом файле -->
        <div class="file-info">
            <div class="file-info-item">
                <div class="file-info-label">Тестовый файл</div>
                <div class="file-info-value">text.txt</div>
            </div>
            <div class="file-info-item">
                <div class="file-info-label">Размер</div>
                <div class="file-info-value" id="file-size">7.41 МБ</div>
            </div>
            <div class="file-info-item">
                <div class="file-info-label">Источник</div>
                <div class="file-info-value">GitHub</div>
            </div>
        </div>

        <!-- Основные метрики -->
        <div class="metrics-grid">
            <div class="metric-card ping-card">
                <div class="metric-icon">⚡</div>
                <div class="metric-label">ПИНГ</div>
                <div class="metric-value" id="ping-value">—</div>
                <div class="metric-unit">мс</div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">⬇️</div>
                <div class="metric-label">ВХОДЯЩАЯ</div>
                <div class="metric-value" id="download-value">—</div>
                <div class="metric-unit">Мбит/с</div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">⬆️</div>
                <div class="metric-label">ИСХОДЯЩАЯ</div>
                <div class="metric-value" id="upload-value">—</div>
                <div class="metric-unit">Мбит/с</div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">📊</div>
                <div class="metric-label">ДЖИТТЕР</div>
                <div class="metric-value" id="jitter-value">—</div>
                <div class="metric-unit">мс</div>
            </div>
        </div>

        <!-- Панель прогресса -->
        <div class="progress-section">
            <div class="current-status" id="current-status">Готов к тестированию</div>
            
            <div class="real-time-speed" id="real-time-speed">0 Мбит/с</div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            
            <div class="progress-stats">
                <span id="progress-stage">Ожидание</span>
                <span id="progress-percent">0%</span>
                <span id="progress-time">0 с</span>
            </div>
        </div>

        <!-- Кнопки управления -->
        <div class="control-panel">
            <button class="btn btn-primary" id="start-test">🚀 Начать тест</button>
            <button class="btn btn-secondary" id="reset-test">🔄 Сбросить</button>
        </div>

        <!-- История тестов -->
        <div class="history-section">
            <h3 class="history-title">📜 История тестов</h3>
            <ul class="history-list" id="history-list">
                <li class="history-item">
                    <span class="time">Ещё нет данных</span>
                    <span class="results">—</span>
                </li>
            </ul>
            <div style="text-align: right; margin-top: 10px;">
                <button class="btn btn-secondary" id="clear-history">Очистить историю</button>
            </div>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        class Internetometer {
            constructor() {
                // Твой тестовый файл
                this.testFile = {
                    url: 'https://raw.githubusercontent.com/ARTEM-web-hue/v-pk.github.io/refs/heads/ARTEM-web-hue-patch-1/text.txt',
                    size: 7.41 * 1024 * 1024, // 7.41 МБ в байтах
                    name: 'text.txt'
                };
                
                this.history = this.loadHistory() || [];
                this.testInProgress = false;
                this.startTime = null;
                
                this.initElements();
                this.addEventListeners();
                this.renderHistory();
            }

            initElements() {
                this.pingEl = document.getElementById('ping-value');
                this.downloadEl = document.getElementById('download-value');
                this.uploadEl = document.getElementById('upload-value');
                this.jitterEl = document.getElementById('jitter-value');
                
                this.startBtn = document.getElementById('start-test');
                this.resetBtn = document.getElementById('reset-test');
                this.clearBtn = document.getElementById('clear-history');
                
                this.currentStatus = document.getElementById('current-status');
                this.realTimeSpeed = document.getElementById('real-time-speed');
                this.progressFill = document.getElementById('progress-fill');
                this.progressStage = document.getElementById('progress-stage');
                this.progressPercent = document.getElementById('progress-percent');
                this.progressTime = document.getElementById('progress-time');
                
                this.historyList = document.getElementById('history-list');
            }

            addEventListeners() {
                this.startBtn.addEventListener('click', () => this.runTest());
                this.resetBtn.addEventListener('click', () => this.resetTest());
                this.clearBtn.addEventListener('click', () => this.clearHistory());
            }

            async runTest() {
                if (this.testInProgress) return;
                
                this.testInProgress = true;
                this.startBtn.disabled = true;
                
                try {
                    // Сбрасываем предыдущие результаты
                    this.resetDisplay();
                    
                    // 1. ТЕСТ ПИНГА (5 замеров)
                    await this.runPingTest();
                    
                    // 2. ТЕСТ СКОРОСТИ ЗАГРУЗКИ
                    await this.runDownloadTest();
                    
                    // 3. ОЦЕНКА ИСХОДЯЩЕЙ СКОРОСТИ
                    this.estimateUploadSpeed();
                    
                    // 4. Сохраняем результат
                    this.saveResult();
                    
                    this.currentStatus.textContent = '✅ Тест завершен!';
                    
                } catch (error) {
                    console.error('Ошибка теста:', error);
                    this.currentStatus.textContent = '❌ Ошибка тестирования';
                } finally {
                    this.testInProgress = false;
                    this.startBtn.disabled = false;
                    
                    setTimeout(() => {
                        this.progressFill.style.width = '0%';
                        this.progressStage.textContent = 'Ожидание';
                        this.progressPercent.textContent = '0%';
                        this.progressTime.textContent = '0 с';
                        this.realTimeSpeed.textContent = '0 Мбит/с';
                    }, 2000);
                }
            }

            async runPingTest() {
                this.updateStatus('Измерение пинга...', 10);
                
                const pings = [];
                const servers = [
                    'https://ya.ru/favicon.ico',
                    'https://mail.ru/favicon.ico',
                    'https://github.com/favicon.ico',
                    'https://www.google.com/favicon.ico'
                ];
                
                for (let i = 0; i < 8; i++) {
                    const server = servers[i % servers.length];
                    const ping = await this.measurePing(server);
                    pings.push(ping);
                    
                    const avgPing = Math.round(pings.reduce((a, b) => a + b, 0) / pings.length);
                    this.pingEl.textContent = avgPing;
                    
                    this.updateStatus(
                        `Пинг: замер ${i+1}/8`, 
                        10 + (i * 5),
                        `Текущий: ${ping} мс`
                    );
                    
                    await this.sleep(200);
                }
                
                // Рассчитываем финальный пинг и джиттер
                const avgPing = Math.round(pings.reduce((a, b) => a + b, 0) / pings.length);
                const jitter = this.calculateJitter(pings);
                
                this.pingEl.textContent = avgPing;
                this.jitterEl.textContent = jitter;
            }

            measurePing(url) {
                return new Promise((resolve) => {
                    const start = Date.now();
                    const img = new Image();
                    
                    const timeout = setTimeout(() => {
                        resolve(999);
                    }, 3000);
                    
                    img.onload = () => {
                        clearTimeout(timeout);
                        const ping = Date.now() - start;
                        resolve(ping);
                    };
                    
                    img.onerror = () => {
                        clearTimeout(timeout);
                        resolve(999);
                    };
                    
                    img.src = url + '?v=' + Date.now() + Math.random();
                });
            }

            async runDownloadTest() {
                this.updateStatus('Загрузка тестового файла...', 30);
                
                return new Promise((resolve, reject) => {
                    const start = Date.now();
                    this.startTime = start;
                    
                    const xhr = new XMLHttpRequest();
                    
                    // Отслеживаем прогресс загрузки
                    xhr.onprogress = (event) => {
                        if (event.lengthComputable) {
                            const loaded = event.loaded;
                            const timeElapsed = (Date.now() - start) / 1000;
                            
                            // Текущая скорость в реальном времени
                            const currentSpeedMbps = (loaded * 8) / (1024 * 1024) / timeElapsed;
                            this.realTimeSpeed.textContent = currentSpeedMbps.toFixed(1) + ' Мбит/с';
                            
                            // Прогресс в процентах
                            const percent = (loaded / this.testFile.size) * 100;
                            this.progressFill.style.width = percent + '%';
                            this.progressPercent.textContent = Math.round(percent) + '%';
                            this.progressTime.textContent = timeElapsed.toFixed(1) + ' с';
                            
                            // Обновляем текущую скорость на дисплее
                            this.downloadEl.textContent = currentSpeedMbps.toFixed(1);
                        }
                    };
                    
                    xhr.onload = () => {
                        const duration = (Date.now() - start) / 1000;
                        const speedMbps = (this.testFile.size * 8) / (1024 * 1024) / duration;
                        
                        this.downloadEl.textContent = speedMbps.toFixed(1);
                        this.realTimeSpeed.textContent = speedMbps.toFixed(1) + ' Мбит/с';
                        this.progressFill.style.width = '100%';
                        this.progressPercent.textContent = '100%';
                        this.progressTime.textContent = duration.toFixed(1) + ' с';
                        
                        this.updateStatus('Загрузка завершена!', 70);
                        resolve(speedMbps);
                    };
                    
                    xhr.onerror = () => {
                        this.updateStatus('Ошибка загрузки', 70);
                        reject();
                    };
                    
                    xhr.open('GET', this.testFile.url + '?t=' + Date.now(), true);
                    xhr.send();
                });
            }

            estimateUploadSpeed() {
                this.updateStatus('Оценка исходящей скорости...', 80);
                
                // Оцениваем upload на основе download и пинга
                const download = parseFloat(this.downloadEl.textContent) || 30;
                const ping = parseInt(this.pingEl.textContent) || 50;
                
                let upload;
                if (ping < 30) {
                    upload = download * 0.9;
                } else if (ping < 60) {
                    upload = download * 0.7;
                } else if (ping < 100) {
                    upload = download * 0.5;
                } else {
                    upload = download * 0.3;
                }
                
                this.uploadEl.textContent = upload.toFixed(1);
                this.updateStatus('Оценка завершена', 90);
            }

            calculateJitter(pings) {
                if (pings.length < 2) return 0;
                let sum = 0;
                for (let i = 1; i < pings.length; i++) {
                    sum += Math.abs(pings[i] - pings[i-1]);
                }
                return Math.round(sum / (pings.length - 1));
            }

            saveResult() {
                const result = {
                    ping: this.pingEl.textContent,
                    download: this.downloadEl.textContent,
                    upload: this.uploadEl.textContent,
                    jitter: this.jitterEl.textContent,
                    time: new Date().toLocaleTimeString(),
                    date: new Date().toLocaleDateString()
                };
                
                this.history.unshift(result);
                if (this.history.length > 10) {
                    this.history.pop();
                }
                
                localStorage.setItem('internetometer_history', JSON.stringify(this.history));
                this.renderHistory();
            }

            loadHistory() {
                const saved = localStorage.getItem('internetometer_history');
                return saved ? JSON.parse(saved) : [];
            }

            renderHistory() {
                if (this.history.length === 0) {
                    this.historyList.innerHTML = '<li class="history-item"><span class="time">Ещё нет данных</span><span class="results">—</span></li>';
                    return;
                }
                
                this.historyList.innerHTML = this.history.map(item => `
                    <li class="history-item">
                        <span class="time">${item.date} ${item.time}</span>
                        <span class="results">⚡${item.ping} ⬇️${item.download} ⬆️${item.upload}</span>
                    </li>
                `).join('');
            }

            updateStatus(message, percent, detail = '') {
                this.currentStatus.textContent = message;
                if (percent !== undefined) {
                    this.progressFill.style.width = percent + '%';
                    this.progressPercent.textContent = percent + '%';
                }
                if (detail) {
                    this.progressStage.textContent = detail;
                }
            }

            resetDisplay() {
                this.pingEl.textContent = '—';
                this.downloadEl.textContent = '—';
                this.uploadEl.textContent = '—';
                this.jitterEl.textContent = '—';
                this.realTimeSpeed.textContent = '0 Мбит/с';
                this.progressFill.style.width = '0%';
                this.progressPercent.textContent = '0%';
                this.progressTime.textContent = '0 с';
            }

            resetTest() {
                this.resetDisplay();
                this.currentStatus.textContent = 'Готов к тестированию';
            }

            clearHistory() {
                if (confirm('Очистить всю историю тестов?')) {
                    this.history = [];
                    localStorage.removeItem('internetometer_history');
                    this.renderHistory();
                }
            }

            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new Internetometer();
        });
    </script>
</body>
</html>
