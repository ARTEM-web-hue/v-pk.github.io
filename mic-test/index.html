<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест микрофона - В ПК!</title>
    
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.8em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            font-size: 1.2em;
        }

        /* Карточка */
        .mic-card {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        /* Статус */
        .permission-status {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .status-icon {
            font-size: 2em;
        }

        .status-text {
            color: #2c3e50;
            font-size: 1.1em;
        }

        .status-text .denied {
            color: #e74c3c;
            font-weight: bold;
        }

        .status-text .granted {
            color: #27ae60;
            font-weight: bold;
        }

        /* График */
        .visualizer-container {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .visualizer-title {
            color: white;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .volume-level {
            color: #00ff9d;
        }

        #visualizer {
            width: 100%;
            height: 200px;
            background: #0f0f1a;
            border-radius: 15px;
        }

        /* Кнопка эха */
        .echo-control {
            text-align: center;
            margin: 30px 0;
        }

        .echo-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 60px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(52,152,219,0.4);
        }

        .echo-btn.echo-active {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            animation: pulse 1.5s infinite;
        }

        .echo-btn.echo-listening {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(241,196,15,0.4); }
            50% { transform: scale(1.05); box-shadow: 0 20px 50px rgba(241,196,15,0.6); }
        }

        .echo-status {
            margin-top: 15px;
            color: #7f8c8d;
            font-size: 1.1em;
        }

        /* Индикаторы */
        .indicators {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .indicator {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .indicator-label {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .indicator-value {
            color: #2c3e50;
            font-size: 1.3em;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .indicators {
                grid-template-columns: 1fr;
            }
            
            .echo-btn {
                padding: 15px 30px;
                font-size: 1.2em;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <div class="container">
        <h1>🎤 Тест микрофона</h1>
        <div class="subtitle">Скажи что-нибудь — через секунду услышишь эхо</div>

        <div class="mic-card">
            <!-- Статус -->
            <div class="permission-status" id="permissionStatus">
                <div class="status-icon">⏳</div>
                <div class="status-text">
                    <span>Запрашиваю доступ к микрофону...</span>
                </div>
            </div>

            <!-- Визуализатор -->
            <div class="visualizer-container">
                <div class="visualizer-title">
                    <span>📊 Твой голос сейчас</span>
                    <span class="volume-level" id="volumeLevel">-∞ дБ</span>
                </div>
                <canvas id="visualizer" width="800" height="200"></canvas>
            </div>

            <!-- Кнопка эха -->
            <div class="echo-control">
                <button class="echo-btn" id="echoBtn" onclick="toggleEcho()" disabled>
                    🎤 АКТИВИРОВАТЬ ЭХО
                </button>
                <div class="echo-status" id="echoStatus">
                    Микрофон слушает постоянно. Нажми кнопку чтобы услышать эхо
                </div>
            </div>

            <!-- Индикаторы -->
            <div class="indicators">
                <div class="indicator">
                    <div class="indicator-label">Громкость</div>
                    <div class="indicator-value" id="volumePercent">0%</div>
                </div>
                <div class="indicator">
                    <div class="indicator-label">Частота</div>
                    <div class="indicator-value" id="frequency">—</div>
                </div>
                <div class="indicator">
                    <div class="indicator-label">Эхо</div>
                    <div class="indicator-value" id="echoIndicator">⏸️</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        // Глобальные переменные
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let mediaStream = null;
        let source = null;
        let animationId = null;
        let echoEnabled = false;
        let isListening = false;
        let lastSoundTime = 0;
        let soundDetected = false;

        // Canvas
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');

        // ЗАПРАШИВАЕМ ДОСТУП СРАЗУ ПРИ ЗАГРУЗКЕ
        async function initMicrophone() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    } 
                });
                
                // Обновляем статус
                document.getElementById('permissionStatus').innerHTML = `
                    <div class="status-icon">🟢</div>
                    <div class="status-text">
                        <span class="granted">✓ Микрофон работает</span>
                    </div>
                `;
                
                // Запускаем прослушивание
                startListening();
                
                // Активируем кнопку
                document.getElementById('echoBtn').disabled = false;
                
            } catch (error) {
                console.error('Ошибка доступа:', error);
                document.getElementById('permissionStatus').innerHTML = `
                    <div class="status-icon">🔴</div>
                    <div class="status-text">
                        <span class="denied">✗ Нет доступа к микрофону: ${error.message}</span>
                    </div>
                `;
            }
        }

        // Запуск прослушивания (ВСЕГДА)
        async function startListening() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                
                source = audioContext.createMediaStreamSource(mediaStream);
                source.connect(analyser);
                
                // Запускаем визуализацию
                draw();
                
                isListening = true;
                
            } catch (error) {
                console.error('Ошибка при запуске:', error);
            }
        }

        // Переключение эха
        function toggleEcho() {
            echoEnabled = !echoEnabled;
            const btn = document.getElementById('echoBtn');
            const status = document.getElementById('echoStatus');
            const echoIndicator = document.getElementById('echoIndicator');
            
            if (echoEnabled) {
                btn.textContent = '🔊 ЭХО АКТИВИРОВАНО';
                btn.classList.add('echo-active');
                status.textContent = 'Эхо включено. Говори что-нибудь...';
                echoIndicator.textContent = '🔊 Вкл';
                echoIndicator.style.color = '#27ae60';
            } else {
                btn.textContent = '🎤 АКТИВИРОВАТЬ ЭХО';
                btn.classList.remove('echo-active', 'echo-listening');
                status.textContent = 'Микрофон слушает постоянно. Нажми кнопку чтобы услышать эхо';
                echoIndicator.textContent = '⏸️ Выкл';
                echoIndicator.style.color = '#7f8c8d';
            }
        }

        // Рисование визуализатора и детектор звука
        function draw() {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            const WIDTH = canvas.width;
            const HEIGHT = canvas.height;
            
            const drawVisual = () => {
                animationId = requestAnimationFrame(drawVisual);
                
                analyser.getByteFrequencyData(dataArray);
                
                // Вычисляем громкость
                let sum = 0;
                for (let i = 0; i < bufferLength; i++) {
                    sum += dataArray[i];
                }
                const avgVolume = sum / bufferLength / 255 * 100;
                
                // Обновляем индикаторы
                document.getElementById('volumePercent').textContent = Math.round(avgVolume) + '%';
                document.getElementById('volumeLevel').textContent = Math.round(avgVolume) + '%';
                
                // Определяем частоту (примерно)
                const maxIndex = dataArray.indexOf(Math.max(...dataArray));
                const frequency = (maxIndex * audioContext.sampleRate) / (2 * bufferLength);
                document.getElementById('frequency').textContent = Math.round(frequency) + ' Гц';
                
                // Детектор звука (для эха)
                if (avgVolume > 5) { // Порог срабатывания
                    const now = Date.now();
                    if (!soundDetected && echoEnabled) {
                        soundDetected = true;
                        lastSoundTime = now;
                        
                        // Меняем кнопку на "слушаю"
                        document.getElementById('echoBtn').classList.add('echo-listening');
                        
                        // Через 1 секунду воспроизводим эхо
                        setTimeout(() => {
                            if (echoEnabled && soundDetected) {
                                playEcho();
                            }
                            document.getElementById('echoBtn').classList.remove('echo-listening');
                        }, 1000);
                    }
                } else {
                    soundDetected = false;
                }
                
                // Рисуем график
                canvasCtx.fillStyle = '#0f0f1a';
                canvasCtx.fillRect(0, 0, WIDTH, HEIGHT);
                
                const barWidth = (WIDTH / bufferLength) * 2.5;
                let x = 0;
                
                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * HEIGHT;
                    
                    // Градиент
                    const green = Math.min(255, dataArray[i] * 2);
                    const red = Math.min(255, dataArray[i]);
                    
                    canvasCtx.fillStyle = `rgb(${red}, ${green}, 100)`;
                    canvasCtx.fillRect(x, HEIGHT - barHeight, barWidth, barHeight);
                    
                    x += barWidth + 1;
                }
            };
            
            drawVisual();
        }

        // Воспроизведение эха (имитация через синтез)
        function playEcho() {
            if (!echoEnabled) return;
            
            const echoCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = echoCtx.currentTime;
            
            // Создаём простой звук (имитация голоса)
            const osc = echoCtx.createOscillator();
            const gainNode = echoCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.value = 440; // Нота Ля
            
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            
            osc.connect(gainNode);
            gainNode.connect(echoCtx.destination);
            
            osc.start(now);
            osc.stop(now + 0.5);
            
            // Визуальный эффект
            const echoIndicator = document.getElementById('echoIndicator');
            echoIndicator.textContent = '🔊 Эхо!';
            echoIndicator.style.color = '#f39c12';
            setTimeout(() => {
                if (echoEnabled) {
                    echoIndicator.textContent = '🔊 Вкл';
                    echoIndicator.style.color = '#27ae60';
                } else {
                    echoIndicator.textContent = '⏸️ Выкл';
                    echoIndicator.style.color = '#7f8c8d';
                }
            }, 500);
        }

        // Запускаем при загрузке
        window.onload = () => {
            initMicrophone();
        };

        // Очистка при выходе
        window.onunload = () => {
            if (source) source.disconnect();
            if (audioContext) audioContext.close();
            if (animationId) cancelAnimationFrame(animationId);
        };
    </script>
</body>
</html>
