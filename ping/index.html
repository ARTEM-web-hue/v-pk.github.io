<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пинг и скорость - В ПК!</title>
    
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }

        .speedtest-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #1e3c72;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .file-info {
            background: #f0f4f8;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 0.95em;
            color: #1e3c72;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .metric-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .metric-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #1e3c72;
            margin: 10px 0;
        }

        .metric-unit {
            color: #999;
            font-size: 0.9em;
        }

        .control-panel {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
        }

        .btn {
            padding: 12px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 60, 114, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .progress-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .progress-bar {
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            width: 0%;
            transition: width 0.3s;
        }

        .status-text {
            text-align: center;
            font-size: 1.1em;
            color: #1e3c72;
            margin: 15px 0;
            min-height: 60px;
        }

        .history-section {
            margin-top: 40px;
            border-top: 2px solid #e0e0e0;
            padding-top: 30px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #f8f9fa;
            margin-bottom: 8px;
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            .metrics-grid {
                grid-template-columns: 1fr;
            }
            
            .speedtest-container {
                margin: 20px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <div class="speedtest-container">
        <h1>📡 Пинг и скорость</h1>
        <div class="subtitle">Измерение задержки и скорости загрузки</div>

        <!-- Информация о тестовом файле -->
        <div class="file-info">
            <strong>Тестовый файл:</strong> samokat.ru/images/logo.svg
        </div>

        <!-- Метрики: только пинг и скорость -->
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-icon">⚡</div>
                <div class="metric-label">ПИНГ</div>
                <div class="metric-value" id="ping-value">—</div>
                <div class="metric-unit">миллисекунды</div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">⬇️</div>
                <div class="metric-label">СКОРОСТЬ</div>
                <div class="metric-value" id="speed-value">—</div>
                <div class="metric-unit">Мбит/с</div>
            </div>
        </div>

        <!-- Статус и прогресс -->
        <div class="progress-section">
            <div class="status-text" id="status-text">
                Нажмите "Начать тест"
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            
            <div style="text-align: center; color: #666;" id="progress-detail">
                Готов
            </div>
        </div>

        <!-- Кнопки -->
        <div class="control-panel">
            <button class="btn btn-primary" id="start-test">🚀 Начать тест</button>
            <button class="btn btn-secondary" id="reset-test">🔄 Сбросить</button>
        </div>

        <!-- История тестов -->
        <div class="history-section">
            <h3>📜 Последние тесты</h3>
            <ul class="history-list" id="history-list">
                <li class="history-item">Ещё нет данных</li>
            </ul>
            <div style="text-align: right; margin-top: 10px;">
                <button class="btn btn-secondary" id="clear-history">Очистить</button>
            </div>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        class PingSpeedTest {
            constructor() {
                // Твой тестовый файл с samokat.ru
                this.testFile = {
                    url: 'https://yastatic.net/jquery/3.3.1/jquery.min.js',
                    name: 'jquery.min.js'
                };
                
                this.history = JSON.parse(localStorage.getItem('ping_history')) || [];
                this.testInProgress = false;
                
                this.initElements();
                this.addEventListeners();
                this.renderHistory();
                
                // Получаем размер файла при загрузке
                this.getFileSize();
            }

            initElements() {
                this.pingEl = document.getElementById('ping-value');
                this.speedEl = document.getElementById('speed-value');
                this.startBtn = document.getElementById('start-test');
                this.resetBtn = document.getElementById('reset-test');
                this.clearBtn = document.getElementById('clear-history');
                this.statusText = document.getElementById('status-text');
                this.progressFill = document.getElementById('progress-fill');
                this.progressDetail = document.getElementById('progress-detail');
                this.historyList = document.getElementById('history-list');
            }

            addEventListeners() {
                this.startBtn.addEventListener('click', () => this.runTest());
                this.resetBtn.addEventListener('click', () => this.resetTest());
                this.clearBtn.addEventListener('click', () => this.clearHistory());
            }

            async getFileSize() {
                try {
                    // Пробуем узнать размер файла через HEAD-запрос
                    const response = await fetch(this.testFile.url, { method: 'HEAD' });
                    const size = response.headers.get('content-length');
                    
                    if (size) {
                        this.fileSize = parseInt(size);
                        this.testFile.size = this.fileSize;
                        console.log('Размер файла:', this.fileSize, 'байт');
                    }
                } catch (error) {
                    console.log('Не удалось получить размер файла, используем оценку');
                    // Если не получилось, используем типичный размер SVG
                    this.fileSize = 15 * 1024; // 15KB (примерно)
                }
            }

            async runTest() {
                if (this.testInProgress) return;
                
                this.testInProgress = true;
                this.startBtn.disabled = true;
                
                try {
                    // 1. ТЕСТ ПИНГА (5 замеров)
                    await this.runPingTest();
                    
                    // 2. ТЕСТ СКОРОСТИ
                    await this.runSpeedTest();
                    
                    // 3. Сохраняем результат
                    this.saveResult();
                    
                    this.statusText.textContent = '✅ Тест завершен!';
                    
                } catch (error) {
                    console.error('Ошибка:', error);
                    this.statusText.textContent = '❌ Ошибка теста';
                } finally {
                    this.testInProgress = false;
                    this.startBtn.disabled = false;
                    
                    setTimeout(() => {
                        if (this.statusText.textContent !== '❌ Ошибка теста') {
                            this.statusText.textContent = 'Готов к новому тесту';
                        }
                        this.progressFill.style.width = '0%';
                        this.progressDetail.textContent = 'Готов';
                    }, 2000);
                }
            }

            async runPingTest() {
                this.statusText.textContent = '📡 Измеряем пинг...';
                this.progressDetail.textContent = 'Замер 1/5';
                
                const pings = [];
                
                for (let i = 0; i < 5; i++) {
                    const ping = await this.measurePing();
                    pings.push(ping);
                    
                    // Показываем средний пинг в реальном времени
                    const avgPing = Math.round(pings.reduce((a, b) => a + b, 0) / pings.length);
                    this.pingEl.textContent = avgPing;
                    
                    this.progressFill.style.width = (i * 20) + '%';
                    this.progressDetail.textContent = `Замер ${i+1}/5 (${ping} мс)`;
                    
                    await this.sleep(300);
                }
                
                const finalPing = Math.round(pings.reduce((a, b) => a + b, 0) / pings.length);
                this.pingEl.textContent = finalPing;
                this.progressFill.style.width = '40%';
            }

            measurePing() {
                return new Promise((resolve) => {
                    const start = Date.now();
                    const img = new Image();
                    
                    const timeout = setTimeout(() => {
                        resolve(999);
                    }, 3000);
                    
                    img.onload = () => {
                        clearTimeout(timeout);
                        const ping = Date.now() - start;
                        resolve(ping);
                    };
                    
                    img.onerror = () => {
                        clearTimeout(timeout);
                        resolve(999);
                    };
                    
                    // Используем разные URL для избежания кеша
                    const urls = [
                        'https://ya.ru/favicon.ico',
                        'https://mail.ru/favicon.ico',
                        'https://github.com/favicon.ico'
                    ];
                    
                    const url = urls[Math.floor(Math.random() * urls.length)];
                    img.src = url + '?v=' + Date.now();
                });
            }

            async runSpeedTest() {
                this.statusText.textContent = '⬇️ Измеряем скорость...';
                this.progressDetail.textContent = 'Загрузка файла...';
                
                return new Promise((resolve, reject) => {
                    const start = Date.now();
                    
                    const xhr = new XMLHttpRequest();
                    
                    xhr.onprogress = (event) => {
                        if (event.lengthComputable && this.fileSize) {
                            const percent = (event.loaded / this.fileSize) * 40 + 40; // 40-80%
                            this.progressFill.style.width = percent + '%';
                            
                            // Показываем текущую скорость
                            const timeElapsed = (Date.now() - start) / 1000;
                            const currentSpeed = (event.loaded * 8) / (1024 * 1024) / timeElapsed;
                            this.speedEl.textContent = currentSpeed.toFixed(1);
                        }
                    };
                    
                    xhr.onload = () => {
                        const duration = (Date.now() - start) / 1000;
                        
                        // Пытаемся получить размер из заголовков
                        const contentLength = xhr.getResponseHeader('content-length');
                        let fileSize = this.fileSize;
                        
                        if (contentLength) {
                            fileSize = parseInt(contentLength);
                        } else {
                            // Если не получилось, используем размер ответа
                            fileSize = xhr.responseText.length;
                        }
                        
                        const speedMbps = (fileSize * 8) / (1024 * 1024) / duration;
                        
                        this.speedEl.textContent = speedMbps.toFixed(1);
                        this.progressFill.style.width = '80%';
                        this.progressDetail.textContent = `Скорость: ${speedMbps.toFixed(1)} Мбит/с`;
                        
                        resolve();
                    };
                    
                    xhr.onerror = () => {
                        reject();
                    };
                    
                    xhr.open('GET', this.testFile.url + '?t=' + Date.now(), true);
                    xhr.send();
                });
            }

            saveResult() {
                const result = {
                    ping: this.pingEl.textContent,
                    speed: this.speedEl.textContent,
                    time: new Date().toLocaleTimeString(),
                    date: new Date().toLocaleDateString()
                };
                
                this.history.unshift(result);
                if (this.history.length > 5) {
                    this.history.pop();
                }
                
                localStorage.setItem('ping_history', JSON.stringify(this.history));
                this.renderHistory();
            }

            renderHistory() {
                if (this.history.length === 0) {
                    this.historyList.innerHTML = '<li class="history-item">Ещё нет данных</li>';
                    return;
                }
                
                this.historyList.innerHTML = this.history.map(item => `
                    <li class="history-item">
                        <span>${item.date} ${item.time}</span>
                        <span>⚡${item.ping}мс | ⬇️${item.speed}Мбит/с</span>
                    </li>
                `).join('');
            }

            resetTest() {
                this.pingEl.textContent = '—';
                this.speedEl.textContent = '—';
                this.statusText.textContent = 'Нажмите "Начать тест"';
                this.progressFill.style.width = '0%';
                this.progressDetail.textContent = 'Готов';
            }

            clearHistory() {
                if (confirm('Очистить историю?')) {
                    this.history = [];
                    localStorage.removeItem('ping_history');
                    this.renderHistory();
                }
            }

            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new PingSpeedTest();
        });
    </script>
</body>
</html>
