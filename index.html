<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная - В ПК!</title>
    
    <!-- Подключаем стили топ-панели (ОДИН РАЗ) -->
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <!-- Стили только для этой страницы -->
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
        }
        
        .hero {
            text-align: center;
            padding: 40px 20px 20px;
        }
        
        .hero h1 {
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .hero p {
            font-size: 1.2em;
            color: #7f8c8d;
            margin-bottom: 40px;
        }
        
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .big-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: white;
            border-radius: 15px;
            padding: 30px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .big-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border-color: #3498db;
        }
        
        .button-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .button-title {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        
        .button-desc {
            font-size: 14px;
            color: #7f8c8d;
            text-align: center;
        }
        
        .big-button:nth-child(1) .button-icon { color: #3498db; }
        .big-button:nth-child(2) .button-icon { color: #e74c3c; }
        .big-button:nth-child(3) .button-icon { color: #2ecc71; }
        .big-button:nth-child(4) .button-icon { color: #f39c12; }
    </style>
</head>
<body>
    <!-- Сюда вставится топ-панель -->
    <div id="top-panel-placeholder"></div>

    <!-- Контент страницы -->
    <div class="hero">
        <h1>Добро пожаловать в В ПК!</h1>
        <p>Выберите нужный инструмент</p>
    </div>
    
    <div class="buttons-grid">
        <a href="/ping/" class="big-button">
            <span class="button-icon">📡</span>
            <span class="button-title">Пинг</span>
            <span class="button-desc">Проверка задержки до серверов</span>
        </a>
        
        <a href="/cps-lkm/" class="big-button">
            <span class="button-icon">🖱️</span>
            <span class="button-title">CPS ЛКМ</span>
            <span class="button-desc">Тест кликов левой кнопкой</span>
        </a>
        
        <a href="/cps-pkm/" class="big-button">
            <span class="button-icon">👆</span>
            <span class="button-title">CPS ПКМ</span>
            <span class="button-desc">Тест кликов правой кнопкой</span>
        </a>
        
        <a href="/autoclickers/" class="big-button">
            <span class="button-icon">⚡</span>
            <span class="button-title">Автокликеры</span>
            <span class="button-desc">Программы для авто-кликов</span>
        </a>
    </div>

    <!-- Подключаем скрипт топ-панели -->
    <script src="/assets/js/top-panel.js"></script>
</body>
</html>
