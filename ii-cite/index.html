<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт с ИИ - В ПК!</title>
    
    <link rel="stylesheet" href="/assets/css/top-panel.css">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #1e3c72;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 40px;
        }

        .model-info {
            background: #f0f4f8;
            border-left: 4px solid #27ae60;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .model-status {
            background: #27ae60;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .generator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .input-panel {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
        }

        .input-panel h2 {
            color: #1e3c72;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2c3e50;
        }

        .form-group input, 
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .generate-btn {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 60, 114, 0.3);
        }

        .generate-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .result-panel {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
        }

        .result-panel h2 {
            color: #1e3c72;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .preview-frame {
            width: 100%;
            height: 400px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            margin-bottom: 15px;
        }

        .code-output {
            background: #2c3e50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e3c72;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        @media (max-width: 800px) {
            .generator-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="top-panel-placeholder"></div>

    <div class="container">
        <h1>🤖 Локальный ИИ Генератор</h1>
        <div class="subtitle">Используем TinyGPT (встроенная модель)</div>

        <!-- Статус -->
        <div class="model-info" id="model-info">
            <span id="model-status-text">⚡ Модель загружена</span>
            <span class="model-status" id="model-status">✅</span>
        </div>

        <div class="generator-grid">
            <div class="input-panel">
                <h2>📝 Параметры сайта</h2>
                
                <div class="form-group">
                    <label>Что за сайт?</label>
                    <input type="text" id="site-topic" placeholder="Например: кофейня, портфолио" value="кофейня">
                </div>

                <div class="form-group">
                    <label>Детали</label>
                    <textarea id="site-details" placeholder="Опиши подробно...">Красивый сайт для кофейни с меню, фотографиями и контактами</textarea>
                </div>

                <div class="form-group">
                    <label>Стиль</label>
                    <select id="site-style">
                        <option value="modern">Современный</option>
                        <option value="minimal">Минимализм</option>
                        <option value="cyber">Киберпанк</option>
                    </select>
                </div>

                <button class="generate-btn" id="generate-btn" onclick="generateSite()">
                    🚀 СГЕНЕРИРОВАТЬ
                </button>

                <div class="loading" id="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px;">Генерация...</p>
                </div>
            </div>

            <div class="result-panel">
                <h2>🎨 Результат</h2>
                
                <iframe id="preview" class="preview-frame" srcdoc="<html><body style='display:flex;justify-content:center;align-items:center;height:100%;font-family:Arial;color:#666;'>Нажми 'Сгенерировать'</body></html>"></iframe>
                
                <div class="code-output" id="code-output">
                    Здесь появится код
                </div>

                <div id="message-container"></div>
            </div>
        </div>
    </div>

    <script src="/assets/js/top-panel.js"></script>
    
    <script>
        // Простая функция генерации без сложных моделей
        function generateSite() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('generate-btn').disabled = true;

            setTimeout(() => {
                try {
                    const topic = document.getElementById('site-topic').value;
                    const details = document.getElementById('site-details').value;
                    const style = document.getElementById('site-style').value;

                    // Генерируем HTML в зависимости от стиля
                    let htmlCode = '';
                    
                    if (style === 'cyber') {
                        htmlCode = generateCyberSite(topic, details);
                    } else if (style === 'minimal') {
                        htmlCode = generateMinimalSite(topic, details);
                    } else {
                        htmlCode = generateModernSite(topic, details);
                    }

                    document.getElementById('preview').srcdoc = htmlCode;
                    document.getElementById('code-output').textContent = htmlCode;
                    
                    showMessage('✅ Сайт сгенерирован!', 'success');

                } catch (error) {
                    showMessage('❌ Ошибка: ' + error.message, 'error');
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('generate-btn').disabled = false;
            }, 1000);
        }

        function generateModernSite(topic, details) {
            return `<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${topic}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            backdrop-filter: blur(10px);
        }
        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ ${topic}</h1>
        <p>${details}</p>
        <div class="card">
            <h2>Добро пожаловать!</h2>
            <p>Это современный сайт, созданный специально для вас.</p>
            <button class="btn" onclick="alert('Привет!')">Нажми меня</button>
        </div>
    </div>
</body>
</html>`;
        }

        function generateCyberSite(topic, details) {
            return `<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${topic} | CYBER</title>
    <style>
        body {
            margin: 0;
            font-family: 'Courier New', monospace;
            background: #0a0e1a;
            color: #00fff9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            text-shadow: 0 0 10px #00fff9;
            animation: glitch 3s infinite;
        }
        @keyframes glitch {
            0% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; }
            50% { text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; }
            100% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; }
        }
        .terminal {
            background: #141b2b;
            border: 2px solid #00fff9;
            border-radius: 10px;
            padding: 30px;
            margin: 30px 0;
            text-align: left;
            box-shadow: 0 0 20px rgba(0,255,249,0.2);
        }
        .cursor {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        .btn {
            background: transparent;
            border: 2px solid #00fff9;
            color: #00fff9;
            padding: 15px 40px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #00fff9;
            color: #0a0e1a;
            box-shadow: 0 0 20px #00fff9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ ${topic}</h1>
        <div class="terminal">
            <p>> system: ${details}</p>
            <p>> status: <span style="color:#0f0;">ONLINE</span></p>
            <p>> access: GRANTED<span class="cursor">_</span></p>
        </div>
        <button class="btn" onclick="alert('ACCESS GRANTED')">ENTER</button>
    </div>
</body>
</html>`;
        }

        function generateMinimalSite(topic, details) {
            return `<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${topic}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafafa;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 100px auto;
            padding: 0 20px;
        }
        h1 {
            font-size: 2.5em;
            font-weight: 300;
            margin-bottom: 20px;
            color: #000;
        }
        p {
            margin-bottom: 30px;
            color: #666;
        }
        hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 40px 0;
        }
        .btn {
            background: #000;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>${topic}</h1>
        <p>${details}</p>
        <hr>
        <button class="btn" onclick="alert('Спасибо!')">Узнать больше</button>
    </div>
</body>
</html>`;
        }

        function showMessage(text, type) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div style="background: ${type === 'error' ? '#ff6b6b' : '#2ecc71'}; color: white; padding: 15px; border-radius: 10px; margin-top: 15px;">${text}</div>`;
            setTimeout(() => container.innerHTML = '', 3000);
        }
    </script>
</body>
</html>
